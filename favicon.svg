<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#04050d"/>

  <!-- Outer orbit ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#5dd8de" stroke-width="0.8" opacity="0.5"/>

  <!-- Orbit dot -->
  <circle cx="16" cy="3" r="1.8" fill="#5dd8de" opacity="0.9"/>

  <!-- JW letters -->
  <text
    x="16" y="21"
    font-family="Arial Black, sans-serif"
    font-size="11"
    font-weight="900"
    text-anchor="middle"
    fill="#f0f2ff"
    letter-spacing="-0.5"
  >JW</text>
</svg>
