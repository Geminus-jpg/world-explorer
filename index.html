<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Janis · World Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#08080e;
  --surface:#0f0f1a;
  --surface2:#161625;
  --border:#1e1e35;
  --accent:#c9a84c;
  --accent2:#e8c97a;
  --accent-dim:rgba(201,168,76,0.12);
  --text:#d4cfc8;
  --text-dim:#6b6880;
  --text-muted:#2e2c42;
  --visited:#c9a84c;
  --visited-hover:#e8c97a;
  --land:#171728;
  --land-hover:#242445;
  --ocean:#050510;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  height:100vh;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* Noise grain overlay */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;
  z-index:1000;
  opacity:0.4;
}

/* ── HEADER ── */
#header{
  padding:18px 36px 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,rgba(15,15,26,0.98) 0%,rgba(8,8,14,0.95) 100%);
  flex-shrink:0;
  position:relative;
  z-index:10;
}

.header-left h1{
  font-family:'Playfair Display',serif;
  font-size:22px;
  font-weight:700;
  color:var(--accent2);
  letter-spacing:0.01em;
}

.header-left .tagline{
  font-size:11px;
  color:var(--text-dim);
  letter-spacing:0.14em;
  text-transform:uppercase;
  margin-top:2px;
}

.header-stats{
  display:flex;
  gap:32px;
  align-items:center;
}

.hstat{
  text-align:center;
}
.hstat-num{
  font-family:'Playfair Display',serif;
  font-size:26px;
  color:var(--accent);
  line-height:1;
}
.hstat-label{
  font-size:10px;
  color:var(--text-dim);
  letter-spacing:0.1em;
  text-transform:uppercase;
  margin-top:3px;
}

.hstat-divider{
  width:1px;
  height:36px;
  background:var(--border);
}

/* Progress bar in header */
.header-prog{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:6px;
}
.prog-label{
  font-size:11px;
  color:var(--text-dim);
  letter-spacing:0.06em;
}
.prog-track{
  width:160px;
  height:3px;
  background:var(--border);
  border-radius:2px;
  overflow:hidden;
}
.prog-fill{
  height:100%;
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  border-radius:2px;
  transition:width 0.6s cubic-bezier(0.4,0,0.2,1);
  width:0%;
}

/* ── MAP WRAPPER ── */
#map-wrap{
  flex:1;
  position:relative;
  overflow:hidden;
}

#map-svg{width:100%;height:100%;display:block;cursor:grab}
#map-svg:active{cursor:grabbing}

.land{
  fill:var(--land);
  stroke:#0a0a18;
  stroke-width:0.5px;
  cursor:pointer;
  transition:fill 0.15s ease;
}
.land:hover{fill:var(--land-hover)}
.land.visited{fill:var(--visited)}
.land.visited:hover{fill:var(--visited-hover)}
.sphere{fill:var(--ocean)}
.graticule{fill:none;stroke:rgba(255,255,255,0.018);stroke-width:0.6px}

/* ── TOOLTIP ── */
#tooltip{
  position:absolute;
  pointer-events:none;
  z-index:200;
  opacity:0;
  transition:opacity 0.1s;
}
#tooltip.show{opacity:1}
.tt-inner{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:10px 15px;
  min-width:140px;
}
.tt-name{
  font-size:13.5px;
  font-weight:500;
  color:var(--text);
}
.tt-meta{
  font-size:10.5px;
  margin-top:3px;
  color:var(--text-dim);
}
.tt-meta.visited{color:var(--accent)}
.tt-hint{
  font-size:10px;
  color:var(--text-muted);
  margin-top:5px;
  border-top:1px solid var(--border);
  padding-top:5px;
}

/* ── ZOOM CONTROLS ── */
#zoom-ctrl{
  position:absolute;
  bottom:24px;
  right:24px;
  display:flex;
  flex-direction:column;
  gap:4px;
  z-index:50;
}
.zbtn{
  width:32px;height:32px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--text-dim);
  font-size:16px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
  user-select:none;
}
.zbtn:hover{border-color:var(--accent);color:var(--accent)}

/* ── BOTTOM BAR ── */
#bottom-bar{
  position:absolute;
  bottom:24px;
  left:24px;
  display:flex;
  gap:16px;
  z-index:50;
}
.legend-item{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:11px;
  color:var(--text-dim);
}
.legend-dot{
  width:9px;height:9px;
  border-radius:2px;
}

/* ── LOADING ── */
#loading{
  position:absolute;inset:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--ocean);z-index:100;gap:16px;
}
.l-title{
  font-family:'Playfair Display',serif;
  font-size:14px;
  color:var(--text-dim);
  letter-spacing:0.2em;
  text-transform:uppercase;
  animation:fpulse 1.8s ease-in-out infinite;
}
.l-bar{width:180px;height:2px;background:var(--border);border-radius:1px;overflow:hidden}
.l-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));width:0%;animation:lbar 2s ease-in-out infinite}
@keyframes fpulse{0%,100%{opacity:0.4}50%{opacity:1}}
@keyframes lbar{0%{width:0%;margin-left:0}60%{width:80%}100%{width:0%;margin-left:100%}}

/* ── OVERLAY ── */
#overlay{
  position:fixed;inset:0;
  background:rgba(5,5,16,0.88);
  z-index:500;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity 0.25s ease;
  backdrop-filter:blur(6px);
}
#overlay.open{opacity:1;pointer-events:all}

#panel{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:16px;
  width:min(680px,92vw);
  max-height:88vh;
  overflow:hidden;
  display:flex;flex-direction:column;
  transform:translateY(20px) scale(0.97);
  transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow:0 40px 80px rgba(0,0,0,0.6);
}
#overlay.open #panel{transform:translateY(0) scale(1)}

/* Panel header */
#panel-head{
  padding:24px 28px 20px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;
  flex-shrink:0;
}
#panel-country{
  font-family:'Playfair Display',serif;
  font-size:26px;color:var(--accent2);
  line-height:1.1;
}
#panel-meta{
  font-size:12px;color:var(--text-dim);
  margin-top:5px;display:flex;gap:14px;
}
.pmeta-item{display:flex;align-items:center;gap:5px}
.pmeta-dot{width:5px;height:5px;background:var(--accent);border-radius:50%;flex-shrink:0}

#close-btn{
  background:none;border:1px solid var(--border);
  border-radius:6px;width:32px;height:32px;
  color:var(--text-dim);font-size:18px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;flex-shrink:0;margin-left:16px;
}
#close-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Panel body */
#panel-body{overflow-y:auto;flex:1;padding:24px 28px}
#panel-body::-webkit-scrollbar{width:4px}
#panel-body::-webkit-scrollbar-track{background:transparent}
#panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Photo gallery */
#gallery{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:22px;
}
.photo-card{
  border-radius:10px;
  overflow:hidden;
  aspect-ratio:4/3;
  background:var(--surface2);
  border:1px solid var(--border);
  position:relative;
  cursor:pointer;
}
.photo-card:first-child{
  grid-column:1/-1;
  aspect-ratio:16/7;
}
.photo-card img{
  width:100%;height:100%;
  object-fit:cover;
  display:block;
  transition:transform 0.3s ease,opacity 0.3s;
  opacity:0.9;
}
.photo-card:hover img{transform:scale(1.03);opacity:1}

/* Placeholder photos */
.photo-placeholder{
  width:100%;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:8px;background:var(--surface2);
}
.photo-placeholder .ph-icon{font-size:28px;opacity:0.25}
.photo-placeholder .ph-text{font-size:11px;color:var(--text-muted);letter-spacing:0.06em}

/* Description */
#panel-desc{
  font-size:14px;line-height:1.75;
  color:var(--text);margin-bottom:20px;
}

/* Highlights */
#highlights{
  display:flex;flex-wrap:wrap;gap:7px;
  margin-bottom:22px;
}
.highlight-tag{
  background:var(--accent-dim);
  border:1px solid rgba(201,168,76,0.25);
  border-radius:20px;
  padding:4px 13px;
  font-size:11.5px;
  color:var(--accent2);
}

/* Not-visited panel state */
#panel-no-visit{
  text-align:center;
  padding:40px 20px;
}
#panel-no-visit .nv-icon{font-size:40px;opacity:0.2;margin-bottom:12px}
#panel-no-visit .nv-title{
  font-family:'Playfair Display',serif;
  font-size:18px;color:var(--text-dim);margin-bottom:8px
}
#panel-no-visit .nv-sub{font-size:13px;color:var(--text-muted)}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div class="header-left">
    <h1>Janis' World Explorer</h1>
    <p class="tagline">Alle Länder der Welt — ein Land nach dem anderen</p>
  </div>
  <div class="header-stats">
    <div class="hstat">
      <div class="hstat-num" id="h-visited">0</div>
      <div class="hstat-label">Besucht</div>
    </div>
    <div class="hstat-divider"></div>
    <div class="hstat">
      <div class="hstat-num" id="h-total">195</div>
      <div class="hstat-label">Länder</div>
    </div>
    <div class="hstat-divider"></div>
    <div class="header-prog">
      <span class="prog-label">Fortschritt <span id="h-pct">0.0%</span></span>
      <div class="prog-track"><div class="prog-fill" id="h-fill"></div></div>
    </div>
  </div>
</div>

<!-- MAP -->
<div id="map-wrap">
  <div id="loading">
    <div class="l-title">Karte wird geladen</div>
    <div class="l-bar"><div class="l-bar-fill"></div></div>
  </div>
  <svg id="map-svg"></svg>
  <div id="tooltip"><div class="tt-inner">
    <div class="tt-name" id="tt-n"></div>
    <div class="tt-meta" id="tt-m"></div>
    <div class="tt-hint" id="tt-h"></div>
  </div></div>
  <div id="zoom-ctrl">
    <button class="zbtn" id="zi">+</button>
    <button class="zbtn" id="zo">−</button>
    <button class="zbtn" id="zr" style="font-size:13px">⟲</button>
  </div>
  <div id="bottom-bar">
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--visited)"></div>
      Besucht
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--land)"></div>
      Noch nicht besucht
    </div>
  </div>
</div>

<!-- COUNTRY OVERLAY -->
<div id="overlay">
  <div id="panel">
    <div id="panel-head">
      <div>
        <div id="panel-country">—</div>
        <div id="panel-meta"></div>
      </div>
      <button id="close-btn">✕</button>
    </div>
    <div id="panel-body"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  DATA  (= später deine data.json)
// ─────────────────────────────────────────────
// Fotos: Pfad relativ zum tracker/-Ordner
// z.B. "photos/deutschland/01.jpg"
// Platzhalter-Fotos werden automatisch angezeigt wenn kein Pfad angegeben

const DATA = {

    highlights: ["Heimatland", "Leopoldshöhe", "Bielefeld", "Alpen", "Ostsee"],

      { src: "", caption: "Titelbild Deutschland" },

    description: "Platzhalter – ersetze diesen Text mit deinen eigenen Erlebnissen in der Schweiz.",

  },
  // Österreich
  40: {
    name: "Österreich",
    visited: true,
    date: "Platzhalter-Datum",
    description: "Platzhalter – ersetze diesen Text mit deinen eigenen Erlebnissen in Österreich.",
    highlights: ["Wien", "Alpen", "Schnitzel"],

  },
  // Tschechien
  203: {

};

// ─────────────────────────────────────────────
//  ISO numeric → Name (Fallback für alle Länder)
// ─────────────────────────────────────────────
const ALL_COUNTRIES = {
  4:"Afghanistan",8:"Albanien",12:"Algerien",24:"Angola",32:"Argentinien",
  36:"Australien",40:"Österreich",31:"Aserbaidschan",50:"Bangladesch",

  218:"Ecuador",231:"Äthiopien",233:"Estland",246:"Finnland",250:"Frankreich",
  276:"Deutschland",288:"Ghana",300:"Griechenland",320:"Guatemala",
  348:"Ungarn",356:"Indien",360:"Indonesien",364:"Iran",368:"Irak",

  414:"Kuwait",417:"Kirgisistan",418:"Laos",422:"Libanon",426:"Lesotho",
  428:"Lettland",430:"Liberia",434:"Libyen",440:"Litauen",442:"Luxemburg",
  450:"Madagaskar",454:"Malawi",458:"Malaysia",466:"Mali",470:"Malta",
  484:"Mexiko",496:"Mongolei",499:"Montenegro",504:"Marokko",508:"Mosambik",
  104:"Myanmar",516:"Namibia",524:"Nepal",528:"Niederlande",554:"Neuseeland",

  646:"Ruanda",682:"Saudi-Arabien",686:"Senegal",688:"Serbien",694:"Sierra Leone",
  703:"Slowakei",705:"Slowenien",706:"Somalia",710:"Südafrika",724:"Spanien",
  144:"Sri Lanka",729:"Sudan",752:"Schweden",756:"Schweiz",760:"Syrien",

  807:"Nordmazedonien",275:"Palästina",798:"Tuvalu",548:"Vanuatu"
};

// ─────────────────────────────────────────────
//  STATS
// ─────────────────────────────────────────────
function updateStats(){
  const n = Object.values(DATA).filter(d=>d.visited).length;
  const tot = 195;
  const pct = (n/tot*100).toFixed(1);
  document.getElementById('h-visited').textContent = n;
  document.getElementById('h-total').textContent = tot;
  document.getElementById('h-pct').textContent = pct + '%';
  document.getElementById('h-fill').style.width = pct + '%';
}

// ─────────────────────────────────────────────
//  OVERLAY
// ─────────────────────────────────────────────
function openPanel(id){
  const d = DATA[id];
  const name = (d && d.name) || ALL_COUNTRIES[id] || 'Unbekannt';

  document.getElementById('panel-country').textContent = name;

  const body = document.getElementById('panel-body');
  const meta = document.getElementById('panel-meta');

  if(!d || !d.visited){
    meta.innerHTML = '';
    body.innerHTML = `
      <div id="panel-no-visit">
        <div class="nv-icon">🗺️</div>
        <div class="nv-title">Noch nicht besucht</div>
        <div class="nv-sub">${name} steht noch auf der Liste. Irgendwann!</div>
      </div>`;
  } else {
    meta.innerHTML = `
      <div class="pmeta-item"><div class="pmeta-dot"></div>${d.date}</div>
      ${d.highlights && d.highlights.length ? `<div class="pmeta-item"><div class="pmeta-dot"></div>${d.highlights.length} Highlights</div>` : ''}
    `;

    // Photos
    const photosHtml = (d.photos || []).map((p,i) => {
      if(p.src){
        return `<div class="photo-card"><img src="${p.src}" alt="${p.caption}" loading="lazy"></div>`;
      } else {
        return `<div class="photo-card">
          <div class="photo-placeholder">
            <div class="ph-icon">📷</div>
            <div class="ph-text">${p.caption || 'Foto ' + (i+1)}</div>
          </div>
        </div>`;
      }
    }).join('');

    const tagsHtml = (d.highlights || []).map(h =>
      `<span class="highlight-tag">${h}</span>`
    ).join('');

    body.innerHTML = `
      ${photosHtml ? `<div id="gallery">${photosHtml}</div>` : ''}
      ${d.description ? `<p id="panel-desc">${d.description}</p>` : ''}
      ${tagsHtml ? `<div id="highlights">${tagsHtml}</div>` : ''}
    `;
  }

  document.getElementById('overlay').classList.add('open');
}

document.getElementById('close-btn').addEventListener('click', closePanel);
document.getElementById('overlay').addEventListener('click', e => {
  if(e.target === document.getElementById('overlay')) closePanel();
});
document.addEventListener('keydown', e => { if(e.key==='Escape') closePanel(); });

function closePanel(){
  document.getElementById('overlay').classList.remove('open');
}

// ─────────────────────────────────────────────
//  MAP
// ─────────────────────────────────────────────
async function initMap(){
  const wrap = document.getElementById('map-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;

  const svg = d3.select('#map-svg').attr('width',W).attr('height',H);

  const proj = d3.geoNaturalEarth1()
    .scale(W / 6.1)
    .translate([W/2, H/2]);

  const geoPath = d3.geoPath().projection(proj);

  svg.append('path').datum({type:'Sphere'}).attr('class','sphere').attr('d',geoPath);
  svg.append('path').datum(d3.geoGraticule()()).attr('class','graticule').attr('d',geoPath);

  const g = svg.append('g');

  const zoom = d3.zoom().scaleExtent([1,12])
    .on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  document.getElementById('zi').onclick = () => svg.transition().duration(280).call(zoom.scaleBy,1.65);
  document.getElementById('zo').onclick = () => svg.transition().duration(280).call(zoom.scaleBy,0.6);
  document.getElementById('zr').onclick = () => svg.transition().duration(400).call(zoom.transform, d3.zoomIdentity);

  let world;
  try {
    world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
  } catch(e) {
    document.getElementById('loading').innerHTML =
      '<div class="l-title" style="color:#c94c4c">Karte konnte nicht geladen werden</div>';
    return;
  }

  document.getElementById('loading').style.display = 'none';

  const tooltip = document.getElementById('tooltip');
  const ttN = document.getElementById('tt-n');
  const ttM = document.getElementById('tt-m');
  const ttH = document.getElementById('tt-h');

  g.selectAll('.land')
    .data(topojson.feature(world, world.objects.countries).features)
    .join('path')
    .attr('class', d => {
      const isVis = DATA[d.id] && DATA[d.id].visited;
      return 'land' + (isVis ? ' visited' : '');
    })
    .attr('d', geoPath)
    .on('mousemove', function(e, d){
      const id = d.id;
      const entry = DATA[id];
      const name = (entry && entry.name) || ALL_COUNTRIES[id] || '—';
      const vis = entry && entry.visited;

      ttN.textContent = name;
      ttM.textContent = vis ? '✓ Besucht' + (entry.date ? ' · ' + entry.date : '') : 'Noch nicht besucht';
      ttM.className = 'tt-meta' + (vis ? ' visited' : '');
      ttH.textContent = vis ? 'Klicken für Details & Fotos' : '';

      const rect = wrap.getBoundingClientRect();
      let tx = e.clientX - rect.left + 14;
      let ty = e.clientY - rect.top - 52;
      if(tx + 180 > W) tx = e.clientX - rect.left - 180;
      if(ty < 0) ty = e.clientY - rect.top + 18;
      tooltip.style.left = tx + 'px';
      tooltip.style.top  = ty + 'px';
      tooltip.classList.add('show');
    })
    .on('mouseleave', () => tooltip.classList.remove('show'))
    .on('click', (e, d) => {
      e.stopPropagation();
      tooltip.classList.remove('show');
      openPanel(d.id);
    });
}

// ─────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────
updateStats();
initMap();
</script>
</body>
</html>
