<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forkcast – Angebote der Woche</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d1b2a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: #0a1628;
      border-bottom: 1px solid #1e3a5f;
      padding: 22px 24px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-left span {
      color: #4a7fa5;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .header-left h1 {
      color: #f0f6ff;
      font-size: 26px;
      font-weight: 800;
      margin-top: 4px;
    }

    .kw-badge {
      background: rgba(34,197,94,.15);
      color: #22c55e;
      font-size: 14px;
      font-weight: 700;
      padding: 9px 18px;
      border-radius: 20px;
      border: 1px solid rgba(34,197,94,.25);
    }

    .filters {
      background: #0f2236;
      border-bottom: 1px solid #1e3a5f;
      padding: 14px 24px;
      overflow-x: auto;
    }

    .filters-inner {
      max-width: 960px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 9px 20px;
      border-radius: 20px;
      border: 1px solid #1e3a5f;
      background: #0d1b2a;
      color: #7ca8cc;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all .15s;
    }

    .filter-btn.active {
      background: #22c55e;
      color: #fff;
      border-color: #22c55e;
    }

    .filter-btn:hover:not(.active) {
      background: #1e3a5f;
      color: #c8dff0;
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 28px 24px;
    }

    .stats-row {
      display: flex;
      gap: 14px;
      margin-bottom: 28px;
    }

    .stat-card {
      flex: 1;
      background: #0f2236;
      border: 1px solid #1e3a5f;
      border-radius: 16px;
      padding: 18px 20px;
    }

    .stat-label { font-size: 12px; color: #4a7fa5; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
    .stat-value { font-size: 28px; font-weight: 800; color: #f0f6ff; margin-top: 6px; }
    .stat-sub   { font-size: 13px; color: #7ca8cc; margin-top: 4px; }

    .deals-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .deal-card {
      background: #0f2236;
      border: 1px solid #1e3a5f;
      border-radius: 16px;
      overflow: hidden;
      transition: transform .15s, box-shadow .15s, border-color .15s;
    }

    .deal-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(0,0,0,.4);
      border-color: #2d5a8a;
    }

    .deal-top {
      padding: 18px 18px 14px;
      border-bottom: 1px solid #1e3a5f;
    }

    .deal-store {
      font-size: 12px;
      font-weight: 700;
      color: #4a7fa5;
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 8px;
    }

    .deal-name {
      font-size: 17px;
      font-weight: 700;
      color: #e8f0fe;
      line-height: 1.35;
      margin-bottom: 6px;
    }

    .deal-unit {
      font-size: 13px;
      color: #5a8ab0;
    }

    .deal-bottom {
      padding: 14px 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .deal-price { font-size: 28px; font-weight: 800; color: #f0f6ff; }
    .deal-original { font-size: 14px; color: #4a7fa5; text-decoration: line-through; margin-top: 3px; }

    .deal-badge {
      background: rgba(34,197,94,.15);
      color: #22c55e;
      border: 1px solid rgba(34,197,94,.3);
      font-size: 18px;
      font-weight: 800;
      padding: 10px 16px;
      border-radius: 12px;
      text-align: center;
    }

    .deal-badge-sub { font-size: 12px; font-weight: 600; color: #16a34a; margin-top: 3px; }

    .loading {
      text-align: center;
      padding: 80px 20px;
      color: #4a7fa5;
    }

    .loading-emoji { font-size: 56px; margin-bottom: 20px; animation: spin 1s linear infinite; display: block; }
    .loading p { font-size: 17px; color: #7ca8cc; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      text-align: center;
      padding: 60px 20px;
      color: #f87171;
    }

    .gueltig {
      font-size: 12px;
      color: #4a7fa5;
      padding: 0 18px 14px;
    }

    a.back-link {
      color: #22c55e;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }

    a.back-link:hover { text-decoration: underline; }

    .history-btn {
      width: 100%;
      padding: 10px 18px;
      background: transparent;
      border: none;
      border-top: 1px solid #1e3a5f;
      color: #4a7fa5;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: left;
      font-family: inherit;
      transition: background .15s, color .15s;
    }

    .history-btn:hover {
      background: #0d1b2a;
      color: #7ca8cc;
    }

    @media (max-width: 600px) {
      .stats-row { flex-direction: column; }
      .deals-grid { grid-template-columns: 1fr 1fr; }
      main { padding: 16px; }
      .deal-name { font-size: 15px; }
      .deal-price { font-size: 24px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-left">
      <span>🛒 Forkcast</span>
      <h1>Angebote der Woche</h1>
    </div>
    <div>
      <span class="kw-badge" id="kw-badge">KW –</span>
    </div>
  </div>
</header>

<div class="filters">
  <div class="filters-inner" id="store-filters">
    <button class="filter-btn active" onclick="filterStore('')">Alle Märkte</button>
  </div>
</div>

<main>
  <div class="stats-row" id="stats-row" style="display:none">
    <div class="stat-card">
      <div class="stat-label">Angebote</div>
      <div class="stat-value" id="stat-count">–</div>
      <div class="stat-sub">diese Woche</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Ø Ersparnis</div>
      <div class="stat-value" id="stat-avg">–</div>
      <div class="stat-sub">pro Produkt</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Top Rabatt</div>
      <div class="stat-value" id="stat-top">–</div>
      <div class="stat-sub" id="stat-top-name">–</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Rezepte</div>
      <div class="stat-value">🍳</div>
      <div class="stat-sub"><a class="back-link" href="/Forkcast/">→ DealKoch öffnen</a></div>
    </div>
  </div>

  <div id="content">
    <div class="loading">
      <div class="loading-emoji">🛒</div>
      <p>Angebote werden geladen…</p>
    </div>
  </div>
</main>

<script>
  const API = "https://forkcast-production-cb85.up.railway.app";
  let allDeals = [];
  let rawDeals = [];
  let activeStore = "";

  // KW berechnen
  const d = new Date();
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = dt.getUTCDay() || 7;
  dt.setUTCDate(dt.getUTCDate() + 4 - day);
  const y = new Date(Date.UTC(dt.getUTCFullYear(), 0, 1));
  const kw = Math.ceil((((dt - y) / 86400000) + 1) / 7);
  document.getElementById("kw-badge").textContent = `KW ${kw}`;

  function formatDate(str) {
    if (!str) return "";
    const d = new Date(str);
    return d.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit" });
  }

  // ── Sparkline ──────────────────────────────────────────────
  function drawSparkline(prices, width=140, height=44) {
    if(!prices || prices.length < 2) return '<span style="color:#4a7fa5;font-size:12px">Nicht genug Daten</span>';
    const min = Math.min(...prices), max = Math.max(...prices);
    const range = max - min || 0.01;
    const avg = prices.reduce((a,b)=>a+b,0)/prices.length;
    const cur = prices[prices.length-1];
    const isRealDeal = cur <= avg * 0.9; // Mindestens 10% unter Durchschnitt
    const color = isRealDeal ? '#22c55e' : cur <= avg ? '#f59e0b' : '#ef4444';

    const pts = prices.map((p,i)=>{
      const x = (i/(prices.length-1))*(width-4)+2;
      const y = height-2 - ((p-min)/range)*(height-4);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');

    const cx = (width-2).toFixed(1);
    const cy = (height-2-((cur-min)/range)*(height-4)).toFixed(1);

    return `<svg width="${width}" height="${height}" viewBox="0 0 ${width} ${height}" style="display:block">
      <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="${cx}" cy="${cy}" r="4" fill="${color}"/>
    </svg>
    <div style="display:flex;justify-content:space-between;font-size:11px;margin-top:4px">
      <span style="color:#4a7fa5">Tief: ${min.toFixed(2)}€</span>
      <span style="color:${color};font-weight:700">${isRealDeal?'✓ Echter Deal':'~ Durchschnitt'}</span>
      <span style="color:#4a7fa5">Hoch: ${max.toFixed(2)}€</span>
    </div>`;
  }

  async function toggleHistory(cardEl) {
    const name     = cardEl.dataset.name;
    const haendler = cardEl.dataset.haendler;

    const existing = cardEl.querySelector('.price-history');
    if(existing) { existing.remove(); return; }

    const div = document.createElement('div');
    div.className = 'price-history';
    div.style.cssText = 'padding:12px 18px 14px;border-top:1px solid #1e3a5f';
    div.innerHTML = '<div style="color:#4a7fa5;font-size:12px">⏳ Lade Verlauf…</div>';
    cardEl.appendChild(div);

    try {
      const url = `${API}/preishistorie?name=${encodeURIComponent(name)}&haendler=${encodeURIComponent(haendler)}`;
      const data = await fetch(url).then(r=>r.json());
      const history = data.history || data;
      if(!Array.isArray(history) || history.length < 2) {
        div.innerHTML = '<div style="color:#4a7fa5;font-size:12px">📊 Noch nicht genug Verlaufsdaten (ab 2. Woche verfügbar)</div>';
        return;
      }
      const prices = history.map(h=>parseFloat(h.preis||0)).filter(p=>p>0);
      div.innerHTML = `<div style="font-size:12px;color:#7ca8cc;font-weight:600;margin-bottom:8px">📊 Preisverlauf (${prices.length} Wochen)</div>${drawSparkline(prices)}`;
    } catch(e) {
      div.innerHTML = '<div style="color:#f87171;font-size:12px">Verlauf nicht verfügbar</div>';
    }
  }

  function renderDeals(deals) {
    const grid = document.getElementById("content");
    if (deals.length === 0) {
      grid.innerHTML = '<div class="error">Keine Angebote gefunden.</div>';
      return;
    }

    grid.innerHTML = `<div class="deals-grid">${deals.map((d,i) => {
      const preis    = parseFloat(d.preis || 0).toFixed(2);
      const norm     = parseFloat(d.normalpreis || 0).toFixed(2);
      const rabatt   = parseFloat(d.rabatt_prozent || 0).toFixed(0);
      const saved    = (parseFloat(d.normalpreis || 0) - parseFloat(d.preis || 0)).toFixed(2);
      const gueltigBis = d.gueltig_bis ? `Gültig bis ${formatDate(d.gueltig_bis)}` : "";

      // Sicher escapen für data-Attribute
      const safeName     = (d.name    || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      const safeHaendler = (d.haendler|| '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');

      return `
        <div class="deal-card" id="card-${i}" data-name="${safeName}" data-haendler="${safeHaendler}">
          <div class="deal-top">
            <div class="deal-store">${d.haendler || ""}</div>
            <div class="deal-name">${d.name || ""}</div>
            <div class="deal-unit">${d.einheit || ""}</div>
          </div>
          <div class="deal-bottom">
            <div class="deal-price-block">
              <div class="deal-price">${preis}€</div>
              <div class="deal-original">statt ${norm}€</div>
            </div>
            <div class="deal-badge">
              −${rabatt}%
              <div class="deal-badge-sub">−${saved}€</div>
            </div>
          </div>
          ${gueltigBis ? `<div class="gueltig">${gueltigBis}</div>` : ""}
          <button class="history-btn" onclick="toggleHistory(document.getElementById('card-${i}'))">
            📊 Preisverlauf anzeigen
          </button>
        </div>
      `;
    }).join("")}</div>`;
  }

  function filterStore(store) {
    activeStore = store;
    document.querySelectorAll(".filter-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.store === store);
    });
    if (!store) {
      renderDeals(allDeals); // Alle Märkte: nur rabattierte, sortiert
      return;
    }
    // Spezifischer Markt: alle Deals des Markts zeigen (auch ohne Rabatt)
    const storeDeals = rawDeals
      .filter(d => d.haendler === store && parseFloat(d.preis || 0) > 0)
      .map(d => {
        const preis = parseFloat(d.preis || 0);
        const norm  = parseFloat(d.normalpreis || 0);
        if (!d.rabatt_prozent && norm > preis && preis > 0) {
          d.rabatt_prozent = ((1 - preis / norm) * 100).toFixed(1);
        }
        return d;
      })
      .sort((a, b) => parseFloat(b.rabatt_prozent || 0) - parseFloat(a.rabatt_prozent || 0));
    renderDeals(storeDeals);
  }

  async function load() {
    try {
      // Deals + Händler parallel laden
      const [raw, haendler] = await Promise.all([
        fetch(`${API}/angebote?limit=1000`).then(r => r.json()),
        fetch(`${API}/haendler`).then(r => r.json()),
      ]);

      // Sicherheitscheck + Rabatt berechnen
      if (!Array.isArray(raw)) throw new Error("Ungültige API-Antwort: " + JSON.stringify(raw).substring(0, 100));
      rawDeals = raw; // alle ungefiltert speichern
      const deals = raw
        .map(d => {
          const preis = parseFloat(d.preis || 0);
          const norm  = parseFloat(d.normalpreis || 0);
          if (!d.rabatt_prozent && norm > preis && preis > 0) {
            d.rabatt_prozent = ((1 - preis / norm) * 100).toFixed(1);
          }
          return d;
        })
        .filter(d => parseFloat(d.rabatt_prozent || 0) > 0)
        .sort((a, b) => parseFloat(b.rabatt_prozent) - parseFloat(a.rabatt_prozent));

      allDeals = deals;

      // Stats
      const totalSaved = deals.reduce((s, d) => s + (parseFloat(d.normalpreis||0) - parseFloat(d.preis||0)), 0);
      const avgSaved   = deals.length ? (totalSaved / deals.length) : 0;
      const topDeal    = deals.reduce((best, d) => parseFloat(d.rabatt_prozent||0) > parseFloat(best.rabatt_prozent||0) ? d : best, deals[0]);

      document.getElementById("stat-count").textContent = deals.length;
      document.getElementById("stat-avg").textContent   = `−${avgSaved.toFixed(2)}€`;
      document.getElementById("stat-top").textContent   = `−${parseFloat(topDeal?.rabatt_prozent||0).toFixed(0)}%`;
      document.getElementById("stat-top-name").textContent = topDeal?.name?.substring(0,20) || "";
      document.getElementById("stats-row").style.display = "flex";

      // Händler-Filter aufbauen — nur Märkte MIT Deals anzeigen
      const storesWithDeals = new Set(
        rawDeals.filter(d => parseFloat(d.preis || 0) > 0).map(d => d.haendler)
      );
      const filterContainer = document.getElementById("store-filters");
      haendler
        .filter(h => storesWithDeals.has(h))
        .forEach(h => {
          const btn = document.createElement("button");
          btn.className = "filter-btn";
          btn.textContent = h;
          btn.dataset.store = h;
          btn.onclick = () => filterStore(h);
          filterContainer.appendChild(btn);
        });

      renderDeals(deals);

    } catch (e) {
      document.getElementById("content").innerHTML = `
        <div class="error">
          <div style="font-size:48px;margin-bottom:12px">⚠️</div>
          <div>Backend nicht erreichbar</div>
          <div style="font-size:13px;color:#64748b;margin-top:8px">${e.message}</div>
        </div>`;
    }
  }

  load();
</script>

</body>
</html>
