<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#04050d"/>

  <!-- Globe outer circle -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#5dd8de" stroke-width="1"/>

  <!-- Ocean fill -->
  <circle cx="16" cy="16" r="11" fill="#0c0e1e"/>

  <!-- Latitude lines -->
  <line x1="5" y1="16" x2="27" y2="16" stroke="#1e2240" stroke-width="0.7"/>
  <path d="M7 11 Q16 9 25 11" fill="none" stroke="#1e2240" stroke-width="0.7"/>
  <path d="M7 21 Q16 23 25 21" fill="none" stroke="#1e2240" stroke-width="0.7"/>

  <!-- Longitude lines -->
  <ellipse cx="16" cy="16" rx="5" ry="11" fill="none" stroke="#1e2240" stroke-width="0.7"/>

  <!-- Land masses (stylised) -->
  <!-- Europe/Africa blob -->
  <path d="M15 8 L17 8 L18 10 L17 13 L18 15 L16 18 L15 21 L13 19 L14 16 L13 13 L14 10 Z"
        fill="#5dd8de" opacity="0.55"/>
  <!-- Americas blob -->
  <path d="M9 10 L11 9 L12 11 L11 14 L10 17 L9 19 L8 17 L9 14 Z"
        fill="#e0b84e" opacity="0.6"/>
  <!-- Asia blob -->
  <path d="M19 9 L22 10 L23 12 L21 14 L22 16 L20 15 L19 13 Z"
        fill="#5dd8de" opacity="0.4"/>

  <!-- Globe border on top -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#5dd8de" stroke-width="1" opacity="0.8"/>
</svg>
