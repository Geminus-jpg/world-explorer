<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#07080f;--surface:#0e0f1c;--surface2:#151628;--border:#1a1d32;
  --accent:#c8a84a;--accent2:#e6c76e;--accent-dim:rgba(200,168,74,0.1);
  --text:#ccc8c0;--text-dim:#5a5870;--text-muted:#272a40;
  --visited:#c8a84a;--visited-h:#e6c76e;
  --land:#14162a;--land-h:#1e2240;--ocean:#04050e;
  --green:#3db870;--blue:#3d8fe0;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── HEADER ── */
#header{
  padding:20px 44px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,rgba(14,15,28,0.99),rgba(7,8,15,0.96));
  flex-shrink:0;z-index:10;gap:32px;
}
.h-title h1{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:#fff;letter-spacing:-0.02em}
.h-title p{font-size:11.5px;color:var(--text-dim);letter-spacing:0.12em;text-transform:uppercase;margin-top:3px}
.h-right{display:flex;align-items:center;gap:36px}
.h-stat{text-align:center}
.h-stat-num{font-family:'Space Grotesk',sans-serif;font-size:42px;font-weight:700;color:var(--accent);line-height:1;letter-spacing:-0.03em}
.h-stat-label{font-size:11px;color:var(--text-dim);letter-spacing:0.08em;text-transform:uppercase;margin-top:5px}
.h-divider{width:1px;height:52px;background:var(--border)}
.h-progress{min-width:240px}
.h-prog-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
.h-prog-label{font-size:13px;color:var(--text-dim)}
.h-prog-pct{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;color:var(--accent);letter-spacing:-0.02em}
.h-prog-track{width:100%;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.h-prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width 0.7s cubic-bezier(0.4,0,0.2,1);width:0%}
.h-prog-sub{font-size:11px;color:var(--text-muted);margin-top:6px}

/* ── MAP ── */
#map-wrap{flex:1;position:relative;overflow:hidden;background:var(--ocean)}
#map-svg{width:100%;height:100%;display:block;cursor:grab}
#map-svg:active{cursor:grabbing}
/* No sphere/oval — ocean background comes from #map-wrap */
.land{fill:var(--land);stroke:#060710;stroke-width:0.5px;cursor:pointer;transition:fill 0.12s}
.land:hover{fill:var(--land-h)}
.land.visited{fill:var(--visited)}
.land.visited:hover{fill:var(--visited-h)}
.graticule{fill:none;stroke:rgba(255,255,255,0.015);stroke-width:0.5px}

/* ── TOOLTIP ── */
#tooltip{position:absolute;pointer-events:none;z-index:200;opacity:0;transition:opacity 0.08s}
#tooltip.show{opacity:1}
.tt-inner{background:rgba(14,15,28,0.97);border:1px solid var(--border);border-radius:10px;padding:12px 16px;min-width:160px;backdrop-filter:blur(8px)}
.tt-name{font-size:14px;font-weight:600;color:#fff}
.tt-meta{font-size:11.5px;margin-top:3px;color:var(--text-dim)}
.tt-meta.v{color:var(--accent)}
.tt-hint{font-size:10.5px;color:var(--text-muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}

/* ── ZOOM ── */
#zoom-ctrl{position:absolute;bottom:88px;right:28px;display:flex;flex-direction:column;gap:5px;z-index:50}
.zbtn{width:38px;height:38px;background:rgba(14,15,28,0.9);border:1px solid var(--border);border-radius:8px;color:var(--text-dim);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;user-select:none;backdrop-filter:blur(4px)}
.zbtn:hover{border-color:var(--accent);color:var(--accent)}

/* ── LEGEND ── */
#map-legend{position:absolute;bottom:88px;left:28px;display:flex;gap:18px;z-index:50}
.leg-item{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--text-dim)}
.leg-dot{width:10px;height:10px;border-radius:3px}

/* ── MICROSTATE STRIP ── */
#microstrip{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 44px;display:flex;align-items:center;gap:10px;min-height:52px}
#microstrip .ms-label{font-size:11px;color:var(--text-dim);letter-spacing:0.1em;text-transform:uppercase;white-space:nowrap;margin-right:4px;flex-shrink:0}
.ms-chips{display:flex;gap:7px;flex-wrap:wrap}
.ms-chip{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text-dim);transition:all 0.15s;white-space:nowrap}
.ms-chip:hover{border-color:var(--accent);color:var(--accent)}
.ms-chip.visited{background:var(--accent-dim);border-color:rgba(200,168,74,0.4);color:var(--accent2)}

/* ── LOADING ── */
#loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--ocean);z-index:100;gap:18px}
.l-title{font-family:'Space Grotesk',sans-serif;font-size:14px;color:var(--text-dim);letter-spacing:0.18em;text-transform:uppercase;animation:fpulse 1.8s ease-in-out infinite}
.l-bar{width:200px;height:2px;background:var(--border);border-radius:1px;overflow:hidden}
.l-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));animation:lbar 2s ease-in-out infinite}
@keyframes fpulse{0%,100%{opacity:0.4}50%{opacity:1}}
@keyframes lbar{0%{width:0%;margin-left:0}60%{width:80%}100%{width:0%;margin-left:100%}}

/* ── OVERLAY ── */
#overlay{position:fixed;inset:0;background:rgba(4,5,14,0.9);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.22s;backdrop-filter:blur(8px)}
#overlay.open{opacity:1;pointer-events:all}
#panel{background:var(--surface);border:1px solid var(--border);border-radius:20px;width:min(720px,93vw);max-height:90vh;overflow:hidden;display:flex;flex-direction:column;transform:translateY(24px) scale(0.97);transition:transform 0.26s cubic-bezier(0.34,1.5,0.64,1);box-shadow:0 48px 96px rgba(0,0,0,0.7)}
#overlay.open #panel{transform:translateY(0) scale(1)}
#panel-head{padding:28px 32px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
#panel-country{font-family:'Space Grotesk',sans-serif;font-size:32px;font-weight:700;color:#fff;line-height:1.1;letter-spacing:-0.02em}
#panel-meta{font-size:13px;color:var(--text-dim);margin-top:8px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.pmeta-item{display:flex;align-items:center;gap:6px}
.pmeta-dot{width:5px;height:5px;background:var(--accent);border-radius:50%;flex-shrink:0}
.type-badge{padding:4px 14px;border-radius:20px;font-size:12px;font-weight:500}
.tp{background:rgba(61,184,112,0.12);border:1px solid rgba(61,184,112,0.25);color:var(--green)}
.tw{background:rgba(61,143,224,0.12);border:1px solid rgba(61,143,224,0.25);color:var(--blue)}
.tb{background:var(--accent-dim);border:1px solid rgba(200,168,74,0.25);color:var(--accent2)}
#close-btn{background:none;border:1px solid var(--border);border-radius:8px;width:38px;height:38px;color:var(--text-dim);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;margin-left:18px}
#close-btn:hover{border-color:var(--accent);color:var(--accent)}
#panel-body{overflow-y:auto;flex:1;padding:28px 32px}
#panel-body::-webkit-scrollbar{width:4px}
#panel-body::-webkit-scrollbar-track{background:transparent}
#panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#gallery{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.photo-card{border-radius:12px;overflow:hidden;aspect-ratio:4/3;background:var(--surface2);border:1px solid var(--border)}
.photo-card:first-child{grid-column:1/-1;aspect-ratio:16/7}
.photo-card img{width:100%;height:100%;object-fit:cover;display:block;opacity:0.9;transition:transform 0.3s,opacity 0.3s}
.photo-card:hover img{transform:scale(1.03);opacity:1}
.photo-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px}
.ph-icon{font-size:30px;opacity:0.18}
.ph-text{font-size:12px;color:var(--text-muted);letter-spacing:0.06em}
#panel-desc{font-size:15px;line-height:1.85;color:var(--text)}
#panel-no-visit{text-align:center;padding:56px 20px}
.nv-icon{font-size:48px;opacity:0.18;margin-bottom:16px}
.nv-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:600;color:var(--text-dim);margin-bottom:10px}
.nv-sub{font-size:14px;color:var(--text-muted)}
</style>
</head>

// ═══════════════════════════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════════════════════════
function identifyUndefined(f){ const [lon,lat]=d3.geoCentroid(f); if(lat>41&&lat<44&&lon>19&&lon<23)return'kosovo'; if(lat>34&&lat<36&&lon>32&&lon<36)return'n_cyprus'; if(lat>8&&lat<12&&lon>43&&lon<50)return'somaliland'; return'unknown_territory'; }
function resolveId(raw,f){ return raw!==undefined?raw:identifyUndefined(f); }
function getEntry(id){ const k=resolveId(id); return DATA[k]??DATA[+k]??DATA[String(k)]??null; }
function getName(id){ const k=resolveId(id); return NAMES[k]??NAMES[+k]??NAMES[String(k)]??null; }

function typeBadge(type){
  if(!type) return '';
  const map={'Private':['tp','✈ Private'],'Work':['tw','💼 Work'],'Both':['tb','✈ Private + 💼 Work']};
  const [cls,label]=map[type]||['tp',type];
  return `<span class="type-badge ${cls}">${label}</span>`;
}

// ─────────────────────────────────────────────
//  STATS
// ─────────────────────────────────────────────
function updateStats(){
  const mapN = Object.values(DATA).filter(d=>d.visited&&d.un_member).length;
  const msN  = MICROSTATES.filter(m=>{const e=getEntry(m.id);return e&&e.visited&&m.un_member;}).length;
  const n    = mapN + msN;
  const pct  = (n/193*100).toFixed(1);
  document.getElementById('h-n').textContent   = n;
  document.getElementById('h-pct').textContent  = pct+'%';
  document.getElementById('h-fill').style.width = pct+'%';
  document.getElementById('h-sub').textContent  = `${n} of 193 UN member states`;
}

// ─────────────────────────────────────────────
//  OVERLAY
// ─────────────────────────────────────────────
function openPanel(id){
  const d    = getEntry(id);
  const ms   = MICROSTATES.find(m=>m.id==id||m.id==+id||String(m.id)==String(id));
  const name = (d&&d.name)||(ms&&ms.name)||getName(id)||'—';
  const isUN = d?d.un_member:(ms?ms.un_member:true);
  document.getElementById('panel-country').textContent = name;
  const body=document.getElementById('panel-body');
  const meta=document.getElementById('panel-meta');
  if(!d||!d.visited){
    meta.innerHTML='';
    body.innerHTML=`<div id="panel-no-visit"><div class="nv-icon">🗺️</div><div class="nv-title">Not yet visited</div><div class="nv-sub">${name} is still on the list. One day!${!isUN?'<br><span style="font-size:12px;color:var(--text-muted)">(Non-UN territory)</span>':''}</div></div>`;
  } else {
    meta.innerHTML=`
      <div class="pmeta-item"><div class="pmeta-dot"></div>${d.date}</div>
      ${typeBadge(d.type)}
      ${!isUN?'<span style="font-size:11px;color:var(--text-muted);font-style:italic">Territory / Non-UN</span>':''}
    `;
    const ph=(d.photos||[]).map((p,i)=>
      p.src
        ?`<div class="photo-card"><img src="${p.src}" alt="${p.caption}" loading="lazy"></div>`
        :`<div class="photo-card"><div class="photo-placeholder"><div class="ph-icon">📷</div><div class="ph-text">${p.caption||'Photo '+(i+1)}</div></div></div>`
    ).join('');
    body.innerHTML=`${ph?`<div id="gallery">${ph}</div>`:''}${d.description?`<p id="panel-desc">${d.description}</p>`:''}`;
  }
  document.getElementById('overlay').classList.add('open');
}

document.getElementById('close-btn').addEventListener('click',closePanel);
document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))closePanel();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePanel();});
function closePanel(){document.getElementById('overlay').classList.remove('open');}

// ─────────────────────────────────────────────
//  MICROSTATE CHIPS
// ─────────────────────────────────────────────
function buildMicrostrip(){
  const wrap=document.getElementById('ms-chips');
  wrap.innerHTML=MICROSTATES.map(m=>{
    const e=getEntry(m.id);
    const vis=e&&e.visited;
    const nonUN=!m.un_member?` <span style="opacity:0.45;font-size:10px">(non-UN)</span>`:'';
    return `<div class="ms-chip${vis?' visited':''}" data-id="${m.id}">${m.name}${nonUN}</div>`;
  }).join('');
  wrap.querySelectorAll('.ms-chip').forEach(el=>
    el.addEventListener('click',()=>openPanel(el.dataset.id))
  );
}

// ─────────────────────────────────────────────
//  MAP — no sphere path, ocean = background color
// ─────────────────────────────────────────────
async function initMap(){
  const wrap=document.getElementById('map-wrap');
  const W=wrap.clientWidth,H=wrap.clientHeight;
  const svg=d3.select('#map-svg').attr('width',W).attr('height',H);
  const proj=d3.geoNaturalEarth1().scale(W/6.1).translate([W/2,H/2]);
  const gp=d3.geoPath().projection(proj);

  // Graticule only — no sphere oval
  svg.append('path').datum(d3.geoGraticule()()).attr('class','graticule').attr('d',gp);

  const g=svg.append('g');
  const zoom=d3.zoom().scaleExtent([1,12]).on('zoom',e=>g.attr('transform',e.transform));
  svg.call(zoom);
  document.getElementById('zi').onclick=()=>svg.transition().duration(260).call(zoom.scaleBy,1.65);
  document.getElementById('zo').onclick=()=>svg.transition().duration(260).call(zoom.scaleBy,0.6);
  document.getElementById('zr').onclick=()=>svg.transition().duration(380).call(zoom.transform,d3.zoomIdentity);

  let world;
  try{world=await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');}
  catch(e){document.getElementById('loading').innerHTML='<div class="l-title" style="color:#c94c4c">Map could not be loaded</div>';return;}
  document.getElementById('loading').style.display='none';

  const tt=document.getElementById('tooltip');
  const ttN=document.getElementById('tt-n'),ttM=document.getElementById('tt-m'),ttH=document.getElementById('tt-h');

  g.selectAll('.land')
    .data(topojson.feature(world,world.objects.countries).features)
    .join('path')
    .attr('class',d=>{const rid=resolveId(d.id,d);const e=getEntry(rid);return 'land'+(e&&e.visited?' visited':'');})
    .attr('d',gp)
    .on('mousemove',function(e,d){
      const rid=resolveId(d.id,d);const en=getEntry(rid);
      const nm=(en&&en.name)||getName(rid)||'—';
      const vis=en&&en.visited;
      ttN.textContent=nm;
      ttM.textContent=vis?'✓ Visited · '+en.date:'Not yet visited';
      ttM.className='tt-meta'+(vis?' v':'');
      ttH.textContent=vis?'Click for details & photos':'';
      const r=wrap.getBoundingClientRect();
      let tx=e.clientX-r.left+16,ty=e.clientY-r.top-60;
      if(tx+195>W)tx=e.clientX-r.left-195;
      if(ty<0)ty=e.clientY-r.top+22;
      tt.style.left=tx+'px';tt.style.top=ty+'px';
      tt.classList.add('show');
    })
    .on('mouseleave',()=>tt.classList.remove('show'))
    .on('click',(e,d)=>{e.stopPropagation();tt.classList.remove('show');openPanel(resolveId(d.id,d));});
}

updateStats();
buildMicrostrip();
initMap();
</script>
