<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Janis · World Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080e;--surface:#0f0f1a;--surface2:#161625;--border:#1e1e35;
  --accent:#c9a84c;--accent2:#e8c97a;--accent-dim:rgba(201,168,76,0.12);
  --text:#d4cfc8;--text-dim:#6b6880;--text-muted:#2e2c42;
  --visited:#c9a84c;--visited-hover:#e8c97a;
  --land:#171728;--land-hover:#242445;--ocean:#050510;
}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:1000;opacity:0.4}
#header{padding:14px 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(15,15,26,0.98) 0%,rgba(8,8,14,0.95) 100%);flex-shrink:0;position:relative;z-index:10}
.header-left h1{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--accent2);letter-spacing:0.01em}
.header-left .tagline{font-size:10px;color:var(--text-dim);letter-spacing:0.14em;text-transform:uppercase;margin-top:2px}
.header-stats{display:flex;gap:24px;align-items:center}
.hstat{text-align:center}
.hstat-num{font-family:'Playfair Display',serif;font-size:24px;color:var(--accent);line-height:1}
.hstat-label{font-size:9.5px;color:var(--text-dim);letter-spacing:0.1em;text-transform:uppercase;margin-top:3px}
.hstat-divider{width:1px;height:32px;background:var(--border)}
.prog-row{display:flex;flex-direction:column;gap:6px}
.prog-item{display:flex;align-items:center;gap:8px}
.prog-label{font-size:10px;color:var(--text-dim);white-space:nowrap;min-width:115px;text-align:right}
.prog-track{width:110px;height:2px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width 0.6s cubic-bezier(0.4,0,0.2,1);width:0%}
#map-wrap{flex:1;position:relative;overflow:hidden}
#map-svg{width:100%;height:100%;display:block;cursor:grab}
#map-svg:active{cursor:grabbing}
.land{fill:var(--land);stroke:#0a0a18;stroke-width:0.5px;cursor:pointer;transition:fill 0.15s ease}
.land:hover{fill:var(--land-hover)}
.land.visited{fill:var(--visited)}
.land.visited:hover{fill:var(--visited-hover)}
.sphere{fill:var(--ocean)}
.graticule{fill:none;stroke:rgba(255,255,255,0.018);stroke-width:0.6px}
#tooltip{position:absolute;pointer-events:none;z-index:200;opacity:0;transition:opacity 0.1s}
#tooltip.show{opacity:1}
.tt-inner{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px 15px;min-width:140px}
.tt-name{font-size:13.5px;font-weight:500;color:var(--text)}
.tt-meta{font-size:10.5px;margin-top:3px;color:var(--text-dim)}
.tt-meta.visited{color:var(--accent)}
.tt-hint{font-size:10px;color:var(--text-muted);margin-top:5px;border-top:1px solid var(--border);padding-top:5px}
#zoom-ctrl{position:absolute;bottom:24px;right:24px;display:flex;flex-direction:column;gap:4px;z-index:50}
.zbtn{width:32px;height:32px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text-dim);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;user-select:none}
.zbtn:hover{border-color:var(--accent);color:var(--accent)}
#bottom-bar{position:absolute;bottom:24px;left:24px;display:flex;gap:16px;z-index:50}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text-dim)}
.legend-dot{width:9px;height:9px;border-radius:2px}
#loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--ocean);z-index:100;gap:16px}
.l-title{font-family:'Playfair Display',serif;font-size:14px;color:var(--text-dim);letter-spacing:0.2em;text-transform:uppercase;animation:fpulse 1.8s ease-in-out infinite}
.l-bar{width:180px;height:2px;background:var(--border);border-radius:1px;overflow:hidden}
.l-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));animation:lbar 2s ease-in-out infinite}
@keyframes fpulse{0%,100%{opacity:0.4}50%{opacity:1}}
@keyframes lbar{0%{width:0%;margin-left:0}60%{width:80%}100%{width:0%;margin-left:100%}}
#overlay{position:fixed;inset:0;background:rgba(5,5,16,0.88);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.25s ease;backdrop-filter:blur(6px)}
#overlay.open{opacity:1;pointer-events:all}
#panel{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:min(680px,92vw);max-height:88vh;overflow:hidden;display:flex;flex-direction:column;transform:translateY(20px) scale(0.97);transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1);box-shadow:0 40px 80px rgba(0,0,0,0.6)}
#overlay.open #panel{transform:translateY(0) scale(1)}
#panel-head{padding:22px 26px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;flex-shrink:0}
#panel-country{font-family:'Playfair Display',serif;font-size:26px;color:var(--accent2);line-height:1.1}
#panel-meta{font-size:12px;color:var(--text-dim);margin-top:6px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.pmeta-item{display:flex;align-items:center;gap:5px}
.pmeta-dot{width:5px;height:5px;background:var(--accent);border-radius:50%;flex-shrink:0}
.type-badge{padding:3px 11px;border-radius:20px;font-size:10.5px;font-weight:500;letter-spacing:0.05em}
.type-private{background:rgba(76,201,122,0.13);border:1px solid rgba(76,201,122,0.28);color:#4cc97a}
.type-work{background:rgba(76,143,201,0.13);border:1px solid rgba(76,143,201,0.28);color:#4c8fc9}
.type-both{background:rgba(201,168,76,0.13);border:1px solid rgba(201,168,76,0.28);color:var(--accent2)}
#close-btn{background:none;border:1px solid var(--border);border-radius:6px;width:32px;height:32px;color:var(--text-dim);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;flex-shrink:0;margin-left:16px}
#close-btn:hover{border-color:var(--accent);color:var(--accent)}
#panel-body{overflow-y:auto;flex:1;padding:22px 26px}
#panel-body::-webkit-scrollbar{width:4px}
#panel-body::-webkit-scrollbar-track{background:transparent}
#panel-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#gallery{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.photo-card{border-radius:10px;overflow:hidden;aspect-ratio:4/3;background:var(--surface2);border:1px solid var(--border)}
.photo-card:first-child{grid-column:1/-1;aspect-ratio:16/7}
.photo-card img{width:100%;height:100%;object-fit:cover;display:block;opacity:0.9;transition:transform 0.3s,opacity 0.3s}
.photo-card:hover img{transform:scale(1.03);opacity:1}
.photo-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
.ph-icon{font-size:26px;opacity:0.2}
.ph-text{font-size:11px;color:var(--text-muted);letter-spacing:0.06em}
#panel-desc{font-size:14px;line-height:1.75;color:var(--text)}
#panel-no-visit{text-align:center;padding:40px 20px}
.nv-icon{font-size:40px;opacity:0.2;margin-bottom:12px}
.nv-title{font-family:'Playfair Display',serif;font-size:18px;color:var(--text-dim);margin-bottom:8px}
.nv-sub{font-size:13px;color:var(--text-muted)}
</style>
</head>

      </div>
      <div class="prog-item">

    </div>
  </div>
</div>

<div id="map-wrap">

    <div class="l-bar"><div class="l-bar-fill"></div></div>
  </div>

  <div id="tooltip"><div class="tt-inner">
    <div class="tt-name" id="tt-n"></div>
    <div class="tt-meta" id="tt-m"></div>
    <div class="tt-hint" id="tt-h"></div>
  </div></div>
  <div id="zoom-ctrl">
    <button class="zbtn" id="zi">+</button>
    <button class="zbtn" id="zo">−</button>
    <button class="zbtn" id="zr" style="font-size:13px">⟲</button>
  </div>
  <div id="bottom-bar">
    <div class="legend-item"><div class="legend-dot" style="background:var(--visited)"></div>Visited</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--land)"></div>Not yet visited</div>
  </div>
</div>

<div id="overlay">
  <div id="panel">
    <div id="panel-head">

      </div>

    </div>
    <div id="panel-body"></div>

</div>

// ─────────────────────────────────────────────
//  STATS
// ─────────────────────────────────────────────
function updateStats(){
  const entries  = Object.values(DATA).filter(d => d.visited);
  const total    = entries.length;
  const unCount  = entries.filter(d => d.un_member).length;
  const pct1 = (total   / 252 * 100).toFixed(1);
  const pct2 = (unCount / 193 * 100).toFixed(1);
  document.getElementById('h-visited').textContent = total;
  document.getElementById('h-un').textContent      = unCount;
  document.getElementById('h-pct1').textContent    = pct1 + '%';
  document.getElementById('h-pct2').textContent    = pct2 + '%';
  document.getElementById('h-fill1').style.width   = pct1 + '%';
  document.getElementById('h-fill2').style.width   = pct2 + '%';
}

// ─────────────────────────────────────────────
//  TYPE BADGE
// ─────────────────────────────────────────────
function typeBadge(type){
  if(!type) return '';
  const map = {
    'Private': ['type-private','✈ Private'],
    'Work':    ['type-work',   '💼 Work'],
    'Both':    ['type-both',   '✈ Private + 💼 Work']
  };
  const [cls, label] = map[type] || ['type-private', type];
  return `<span class="type-badge ${cls}">${label}</span>`;
}

// ─────────────────────────────────────────────
//  OVERLAY
// ─────────────────────────────────────────────
function openPanel(id){
  const d    = DATA[id];
  const name = (d && d.name) || NAMES[id] || 'Unknown';
  document.getElementById('panel-country').textContent = name;

  const body = document.getElementById('panel-body');
  const meta = document.getElementById('panel-meta');

  if(!d || !d.visited){
    meta.innerHTML = '';
    body.innerHTML = `
      <div id="panel-no-visit">
        <div class="nv-icon">🗺️</div>
        <div class="nv-title">Not yet visited</div>
        <div class="nv-sub">${name} is still on the list. One day!</div>
      </div>`;
  } else {
    meta.innerHTML = `
      <div class="pmeta-item"><div class="pmeta-dot"></div>${d.date}</div>
      ${typeBadge(d.type)}
      ${!d.un_member ? '<span style="font-size:10px;color:var(--text-muted);font-style:italic">Territory / Non-UN</span>' : ''}
    `;
    const photosHtml = (d.photos||[]).map((p,i) =>
      p.src
        ? `<div class="photo-card"><img src="${p.src}" alt="${p.caption}" loading="lazy"></div>`
        : `<div class="photo-card"><div class="photo-placeholder"><div class="ph-icon">📷</div><div class="ph-text">${p.caption||'Photo '+(i+1)}</div></div></div>`
    ).join('');

    body.innerHTML = `
      ${photosHtml ? `<div id="gallery">${photosHtml}</div>` : ''}
      ${d.description ? `<p id="panel-desc">${d.description}</p>` : ''}
    `;
  }
  document.getElementById('overlay').classList.add('open');
}

document.getElementById('close-btn').addEventListener('click', closePanel);
document.getElementById('overlay').addEventListener('click', e => {
  if(e.target === document.getElementById('overlay')) closePanel();
});
document.addEventListener('keydown', e => { if(e.key==='Escape') closePanel(); });
function closePanel(){ document.getElementById('overlay').classList.remove('open'); }

// ─────────────────────────────────────────────
//  MAP
// ─────────────────────────────────────────────
async function initMap(){
  const wrap = document.getElementById('map-wrap');
  const W = wrap.clientWidth, H = wrap.clientHeight;
  const svg = d3.select('#map-svg').attr('width',W).attr('height',H);
  const proj = d3.geoNaturalEarth1().scale(W/6.1).translate([W/2,H/2]);
  const geoPath = d3.geoPath().projection(proj);

  svg.append('path').datum({type:'Sphere'}).attr('class','sphere').attr('d',geoPath);
  svg.append('path').datum(d3.geoGraticule()()).attr('class','graticule').attr('d',geoPath);

  const g = svg.append('g');
  const zoom = d3.zoom().scaleExtent([1,12]).on('zoom',e=>g.attr('transform',e.transform));
  svg.call(zoom);
  document.getElementById('zi').onclick = ()=>svg.transition().duration(280).call(zoom.scaleBy,1.65);
  document.getElementById('zo').onclick = ()=>svg.transition().duration(280).call(zoom.scaleBy,0.6);
  document.getElementById('zr').onclick = ()=>svg.transition().duration(400).call(zoom.transform,d3.zoomIdentity);

  let world;
  try { world = await d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json'); }
  catch(e){ document.getElementById('loading').innerHTML='<div class="l-title" style="color:#c94c4c">Map could not be loaded</div>'; return; }

  document.getElementById('loading').style.display='none';
  const tooltip=document.getElementById('tooltip');
  const ttN=document.getElementById('tt-n'),ttM=document.getElementById('tt-m'),ttH=document.getElementById('tt-h');

  g.selectAll('.land')
    .data(topojson.feature(world,world.objects.countries).features)
    .join('path')
    .attr('class',d=>'land'+(DATA[d.id]&&DATA[d.id].visited?' visited':''))
    .attr('d',geoPath)
    .on('mousemove',function(e,d){
      const en=DATA[d.id]; const nm=(en&&en.name)||NAMES[d.id]||'—'; const vis=en&&en.visited;
      ttN.textContent=nm;
      ttM.textContent=vis?'✓ Visited · '+en.date:'Not yet visited';
      ttM.className='tt-meta'+(vis?' visited':'');
      ttH.textContent=vis?'Click for details & photos':'';
      const r=wrap.getBoundingClientRect();
      let tx=e.clientX-r.left+14,ty=e.clientY-r.top-52;
      if(tx+180>W)tx=e.clientX-r.left-180; if(ty<0)ty=e.clientY-r.top+18;
      tooltip.style.left=tx+'px'; tooltip.style.top=ty+'px';
      tooltip.classList.add('show');
    })
    .on('mouseleave',()=>tooltip.classList.remove('show'))
    .on('click',(e,d)=>{e.stopPropagation();tooltip.classList.remove('show');openPanel(d.id);});
}

updateStats();
initMap();
</script>
</body>
