<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#0d1b2a"/>

  <!-- Fork: 3 tines (rounded rectangles) -->
  <rect x="21" y="9" width="9" height="32" rx="4.5" fill="#22c55e"/>
  <rect x="45" y="9" width="9" height="32" rx="4.5" fill="#22c55e"/>
  <rect x="69" y="9" width="9" height="32" rx="4.5" fill="#22c55e"/>

  <!-- Fork neck: curved path connecting tines to handle -->
  <path d="M21 41 Q21 58 49 58 Q77 58 77 41" fill="#22c55e"/>

  <!-- Fork handle -->
  <rect x="44" y="58" width="11" height="36" rx="5.5" fill="#22c55e"/>

  <!-- Deal badge (top right) -->
  <circle cx="78" cy="26" r="19" fill="#0d1b2a"/>
  <circle cx="78" cy="26" r="17" fill="#f59e0b"/>
  <text x="78" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="900" fill="#0d1b2a">%</text>
</svg>
