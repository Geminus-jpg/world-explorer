<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forkcast — Roadmap</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,sans-serif;background:#0d1b2a;color:#e2e8f0;min-height:100vh}

    header{background:#0a1628;border-bottom:1px solid #1e3a5f;padding:20px 24px 18px;position:sticky;top:0;z-index:10}
    .hi{max-width:800px;margin:0 auto}
    .hl{font-size:11px;color:#4a7fa5;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
    header h1{font-size:24px;font-weight:800;color:#f0f6ff;margin-bottom:4px}
    header p{font-size:13px;color:#7ca8cc}
    .op{margin-top:14px}
    .op-top{display:flex;justify-content:space-between;font-size:12px;color:#7ca8cc;margin-bottom:5px}
    .pb{height:7px;background:#1e3a5f;border-radius:4px;overflow:hidden}
    .pf{height:100%;background:linear-gradient(90deg,#22c55e,#06b6d4);border-radius:4px;transition:width .4s}

    .tabs{background:#0a1628;border-bottom:1px solid #1e3a5f;padding:0 24px;overflow-x:auto}
    .tabs-inner{max-width:800px;margin:0 auto;display:flex;gap:2px;min-width:max-content}
    .tb{padding:11px 13px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap;color:#7ca8cc;border-bottom:2px solid transparent;transition:all .15s;font-family:inherit}
    .tb.active{color:#22c55e;border-bottom-color:#22c55e}
    .tc{font-size:10px;padding:1px 5px;border-radius:8px;margin-left:3px;background:rgba(74,127,165,.2);color:#4a7fa5}
    .tb.active .tc{background:rgba(34,197,94,.2);color:#22c55e}

    main{max-width:800px;margin:0 auto;padding:22px 24px 60px}
    .tab-content{display:none}
    .tab-content.active{display:block}

    .phase-box{background:#0f2236;border:1px solid #1e3a5f;border-radius:14px;padding:16px 18px;margin-bottom:18px}
    .phase-title{font-size:17px;font-weight:800;margin-bottom:3px}
    .phase-meta{font-size:12px;color:#4a7fa5;font-weight:600;margin-bottom:8px}
    .phase-desc{font-size:13px;color:#7ca8cc;margin-bottom:12px}
    .phase-pb{height:5px;background:#1e3a5f;border-radius:3px;overflow:hidden}
    .phase-pf{height:100%;border-radius:3px;transition:width .4s}
    .phase-pl{font-size:11px;color:#4a7fa5;margin-top:5px}

    .card{background:#0f2236;border:1px solid #1e3a5f;border-radius:12px;padding:13px 15px;margin-bottom:8px;transition:border-color .2s,background .2s}
    .card.ck{border-color:rgba(34,197,94,.45);background:#0d2218}
    .card-head{display:flex;align-items:flex-start;gap:11px;cursor:pointer;user-select:none}
    .chk{width:20px;height:20px;border:2px solid #2a4a6a;border-radius:5px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;margin-top:1px;background:transparent;font-size:0}
    .chk.on{background:#22c55e;border-color:#22c55e;font-size:12px;color:#fff;font-weight:700}
    .card-emoji{font-size:21px;flex-shrink:0;margin-top:0px}
    .card-body{flex:1;min-width:0}
    .card-title{font-size:14px;font-weight:700;color:#e2e8f0;margin-bottom:5px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
    .card-badges{display:flex;gap:5px;flex-wrap:wrap}
    .arrow{color:#4a7fa5;font-size:15px;flex-shrink:0;transition:transform .2s;margin-top:2px}
    .card.open .arrow{transform:rotate(180deg)}
    .detail{font-size:13px;color:#7ca8cc;line-height:1.65;margin-top:11px;padding-top:11px;border-top:1px solid #1e3a5f;display:none}
    .card.open .detail{display:block}

    .badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}

    .sec{font-size:11px;font-weight:700;color:#4a7fa5;text-transform:uppercase;letter-spacing:.08em;margin:18px 0 9px 2px}

    .done-wrap{background:#0f2236;border:1px solid #1e3a5f;border-radius:12px;overflow:hidden;margin-bottom:12px}
    .done-item{display:flex;align-items:flex-start;gap:11px;padding:11px 15px;border-bottom:1px solid #1e3a5f}
    .done-item:last-child{border-bottom:none}
    .done-tick{width:19px;height:19px;border-radius:50%;background:#22c55e18;border:1px solid #22c55e50;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:10px;color:#22c55e;font-weight:800}
    .done-t{font-size:14px;font-weight:700;color:#8aa8c0;margin-bottom:2px}
    .done-d{font-size:12px;color:#4a7fa5;line-height:1.5}

    .info-box{border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:13px}

    @media(max-width:600px){
      main{padding:16px 14px 60px}
      header{padding:14px 14px 12px}
      .tabs{padding:0 14px}
      header h1{font-size:20px}
    }
  </style>
</head>
<body>
<header>
  <div class="hi">
    <div class="hl">🛒 Forkcast / DealKoch</div>
    <h1>Projekt-Roadmap</h1>
    <p>Zeitachse aller Features — systematisch abarbeitbar von Phase 1 bis 5.</p>
    <div class="op">
      <div class="op-top"><span>Gesamtfortschritt</span><span id="ot">–</span></div>
      <div class="pb"><div class="pf" id="of" style="width:0%"></div></div>
    </div>
  </div>
</header>

<div class="tabs"><div class="tabs-inner" id="tab-bar"></div></div>

<main>
  <div id="tab-done" class="tab-content active"></div>
  <div id="tab-p1" class="tab-content"></div>
  <div id="tab-p2" class="tab-content"></div>
  <div id="tab-p3" class="tab-content"></div>
  <div id="tab-p4" class="tab-content"></div>
  <div id="tab-p5" class="tab-content"></div>
</main>

<script>
// ── Palette ───────────────────────────────────────────────────
const C={green:"#22c55e",cyan:"#06b6d4",yellow:"#f59e0b",orange:"#f97316",purple:"#a855f7",muted:"#4a7fa5"};

// ── Completed ─────────────────────────────────────────────────

  {e:"📋",t:"Koch-Dashboard",effort:"1–2 Tage",neu:false,

const DONE_GROUPS=[
  {label:"🏗️ Infrastruktur & Datenpipeline",idx:[0,1,2,3,4]},
  {label:"🎨 Frontend & UI",idx:[5,6,7]},
  {label:"⭐ Interaktionen & Personalisierung",idx:[8,9,10]},
  {label:"📊 Daten & Analytik",idx:[11,12]},
  {label:"🤖 KI & Prompt",idx:[13,14,15]},
  {label:"✨ Polish & Bugfixes",idx:[16,17]},
  {label:"Phase 1",idx:[18,19,20,21]},
  {label:"Phase 2",idx:[22,23,24,25,26]},
  {label:"Phase 3",idx:[27,28,29,30,31]},
];

// ── Open Phases ───────────────────────────────────────────────
const PHASES=[
  
  {

    timeline:"Nächste 1–2 Monate",
    desc:"Neue Infrastruktur oder aufwändige Implementierung nötig. Je mehrere Tage bis eine Woche.",
    items:[

       d:"Weiche Präferenz-Slider: 'mind. X g Protein', 'max. Y g Fett' pro Mahlzeit. Als Formulierung im Prompt ('bevorzuge proteinreiche Rezepte') — KEIN harter Filter (Claude-Schätzungen ±30% zu ungenau). Harte Filter erst wenn Nährwert-Datenbasis verlässlich ist (Phase 5)."},
      {e:"🔔",t:"Preisalarm (Favoriten-Rezepte + Zutaten)",effort:"2–3 Tage",neu:false,
       d:"'Rezept X — Zutaten jetzt 20% günstiger als üblich' per Push/E-Mail. Braucht: PWA (Phase 3) für Push, Vergleichslogik gegen preishistorie-Durchschnitt, Favoriten-Feature (Phase 3). Setzt mehrere Abhängigkeiten voraus."},
      {e:"🥘",t:"Reste-Rezepte Modus",effort:"1–2 Tage",neu:false,
       d:"'Ich habe noch Hähnchen vom Dienstag — was koche ich heute?' Neuer Prompt-Modus mit User-Zutaten-Input, kombiniert eigene Vorräte mit aktuellen Deals. Neues UI-Element + separater Prompt-Zweig."},
      {e:"🔐",t:"Echter Login (Supabase Auth)",effort:"2–3 Tage",neu:false,
       d:"Aktuell: Jeder kann auf 'Janis' Profil zugreifen wenn er den Namen kennt. Supabase Auth: E-Mail/Passwort oder Magic Link. Voraussetzung für echten Multi-User-Betrieb."},

       d:"Marktguru liefert für PLZ 33818 keine Preisdaten für diese Märkte. Erscheinen in /haendler aber werden aus Rezept-Matching herausgefiltert. Eigene Playwright-Scraper oder alternative API-Quelle nötig."},

       d:"PLZ 33818 (Leopoldshöhe) aktuell hardcoded. PLZ als Parameter → andere Regionen unterstützen, Skalierbarkeit, potenziell andere Nutzer. Marktguru API unterstützt PLZ-Parameter."},
    ]
  },
  {
    id:"p5",label:"🔮 Phase 5",sub:"Zukunft",color:C.purple,
    timeline:"Langfristig",
    desc:"Nice-to-have oder Items die weitere Datenbasis / externe Abhängigkeiten benötigen.",
    items:[
      {e:"🧮",t:"Harte Makro-Filter",effort:"langfristig",neu:true,
       d:"Erst wenn verlässliche Nährwert-Daten vorhanden (Open Food Facts API oder eigene DB). Claude-Schätzungen zu ungenau (±30%) für harte Grenzen. Als weiche Prompt-Signale ab Phase 4 möglich."},

       d:"Claude schätzt Makros — oft ungenau. Gegen Open Food Facts API abgleichen für verlässliche Nährwert-Angaben. Voraussetzung für harte Makro-Filter und verlässliches Kalorien-Tracking."},

// ── LocalStorage ──────────────────────────────────────────────
const LS='fk_roadmap_v1';
function getState(){try{return JSON.parse(localStorage.getItem(LS)||'{}')}catch{return{}}}
function toggleItem(id){const s=getState();s[id]?delete s[id]:s[id]=true;localStorage.setItem(LS,JSON.stringify(s));return!!s[id]}
function isDone(id){return!!getState()[id]}

// ── Badge helper ──────────────────────────────────────────────
function badge(txt,col){return`<span class="badge" style="background:${col}20;color:${col};border:1px solid ${col}40">${txt}</span>`}

// ── Render done ───────────────────────────────────────────────
function renderDone(){
  let html=`<div class="info-box" style="background:#22c55e0d;border:1px solid #22c55e28">
    <span style="color:#22c55e;font-weight:700">✅ ${DONE.length} Features erfolgreich umgesetzt</span>
    <span style="color:#4a7fa5;margin-left:8px">— Solide Basis für alle weiteren Phasen.</span>
  </div>`;
  DONE_GROUPS.forEach(g=>{
    html+=`<div class="sec">${g.label}</div><div class="done-wrap">`;
    g.idx.forEach(i=>{
      const it=DONE[i];
      html+=`<div class="done-item"><div class="done-tick">✓</div><div style="flex:1"><div class="done-t">${it.e} ${it.t}</div><div class="done-d">${it.d}</div></div></div>`;
    });
    html+=`</div>`;
  });
  return html;
}

// ── Render phase ──────────────────────────────────────────────
function renderPhase(ph){
  const chk=ph.items.filter((_,i)=>isDone(ph.id+'_'+i)).length;
  const tot=ph.items.length;
  const pct=Math.round(chk/tot*100);
  let html=`<div class="phase-box">
    <div class="phase-title" style="color:${ph.color}">${ph.label} — ${ph.sub}</div>
    <div class="phase-meta">⏱ ${ph.timeline}</div>
    <div class="phase-desc">${ph.desc}</div>
    <div class="phase-pb"><div class="phase-pf" id="ppf_${ph.id}" style="width:${pct}%;background:${ph.color}"></div></div>
    <div class="phase-pl" id="ppl_${ph.id}">${chk} / ${tot} erledigt (${pct}%)</div>
  </div>`;
  ph.items.forEach((it,i)=>{
    const id=ph.id+'_'+i;
    const done=isDone(id);
    html+=`<div class="card ${done?'ck':''}" id="card_${id}">
      <div class="card-head" onclick="cardClick(event,'${id}')">
        <div class="chk ${done?'on':''}" id="chk_${id}" onclick="checkClick(event,'${id}')">✓</div>
        <span class="card-emoji">${it.e}</span>
        <div class="card-body">
          <div class="card-title">${it.t}${it.neu?badge('✨ Neu',C.purple):''}
          </div>
          <div class="card-badges">${badge('⏱ '+it.effort,ph.color)}</div>
        </div>
        <span class="arrow">▼</span>
      </div>
      <div class="detail">${it.d}</div>
    </div>`;
  });
  return html;
}

// ── Handlers ──────────────────────────────────────────────────
function checkClick(ev,id){
  ev.stopPropagation();
  const now=toggleItem(id);
  document.getElementById('chk_'+id).classList.toggle('on',now);
  document.getElementById('card_'+id).classList.toggle('ck',now);
  refreshPhase(id.split('_')[0]);
  refreshOverall();
}
function cardClick(ev,id){
  if(ev.target.classList.contains('chk')||ev.target.closest('.chk'))return;
  document.getElementById('card_'+id).classList.toggle('open');
}
function refreshPhase(pid){
  const ph=PHASES.find(p=>p.id===pid);if(!ph)return;
  const chk=ph.items.filter((_,i)=>isDone(pid+'_'+i)).length;
  const tot=ph.items.length;const pct=Math.round(chk/tot*100);
  const pf=document.getElementById('ppf_'+pid);
  const pl=document.getElementById('ppl_'+pid);
  if(pf)pf.style.width=pct+'%';
  if(pl)pl.textContent=`${chk} / ${tot} erledigt (${pct}%)`;
}
function refreshOverall(){
  const totOpen=PHASES.reduce((s,p)=>s+p.items.length,0);
  const chkOpen=PHASES.reduce((s,p)=>s+p.items.filter((_,i)=>isDone(p.id+'_'+i)).length,0);
  const total=DONE.length+totOpen;
  const done=DONE.length+chkOpen;
  document.getElementById('ot').textContent=`${done} / ${total} erledigt`;
  document.getElementById('of').style.width=Math.round(done/total*100)+'%';
}

// ── Tab logic ─────────────────────────────────────────────────
let curTab='done';
const TABS=[
  {id:'done',label:'✅ Erledigt',count:DONE.length},
  ...PHASES.map(p=>({id:p.id,label:p.label+' '+p.sub,count:p.items.length}))
];

function switchTab(id){
  curTab=id;
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.tb').forEach(e=>e.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  document.querySelector(`.tb[data-id="${id}"]`).classList.add('active');
  const el=document.getElementById('tab-'+id);
  if(!el.innerHTML){el.innerHTML=id==='done'?renderDone():renderPhase(PHASES.find(p=>p.id===id))}
}

// ── Init ──────────────────────────────────────────────────────
document.getElementById('tab-bar').innerHTML=TABS.map(t=>
  `<button class="tb ${t.id==='done'?'active':''}" data-id="${t.id}" onclick="switchTab('${t.id}')">
    ${t.label}<span class="tc">${t.count}</span>
  </button>`).join('');

document.getElementById('tab-done').innerHTML=renderDone();
