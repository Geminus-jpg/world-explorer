<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forkcast — Roadmap</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,sans-serif;background:#0d1b2a;color:#e2e8f0;min-height:100vh}

    /* Header */
    header{background:#0a1628;border-bottom:1px solid #1e3a5f;padding:22px 24px 20px;position:sticky;top:0;z-index:10}
    .header-inner{max-width:760px;margin:0 auto}
    .header-label{font-size:12px;color:#4a7fa5;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
    header h1{font-size:26px;font-weight:800;color:#f0f6ff;margin-bottom:8px}
    header p{font-size:14px;color:#7ca8cc;line-height:1.6}
    .badge-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}

    /* Tabs */
    .tabs{background:#0a1628;border-bottom:1px solid #1e3a5f;padding:0 24px;overflow-x:auto}
    .tabs-inner{max-width:760px;margin:0 auto;display:flex;gap:2px;min-width:max-content}
    .tab-btn{padding:14px 16px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:600;white-space:nowrap;color:#7ca8cc;border-bottom:2px solid transparent;transition:all .15s;font-family:inherit}
    .tab-btn.active{color:#22c55e;border-bottom-color:#22c55e}
    .tab-count{font-size:11px;padding:1px 6px;border-radius:10;margin-left:4px;background:rgba(74,127,165,.2);color:#4a7fa5}
    .tab-btn.active .tab-count{background:rgba(34,197,94,.2);color:#22c55e}

    /* Main */
    main{max-width:760px;margin:0 auto;padding:24px 24px 60px}

    /* Alert banners */
    .alert{border-radius:14px;padding:14px 18px;margin-bottom:20px}
    .alert-title{font-weight:700;margin-bottom:4px}
    .alert-sub{font-size:13px;color:#7ca8cc}

    /* Cards */
    .card{background:#0f2236;border:1px solid #1e3a5f;border-radius:14px;padding:16px 18px;margin-bottom:10px}
    .bug-card.high{border-color:rgba(239,68,68,.5)}
    .bug-title{font-size:15px;font-weight:700;color:#e2e8f0;flex:1;margin-right:12px}
    .bug-body{font-size:13px;color:#7ca8cc;line-height:1.6;margin-top:8px}
    .card-header{display:flex;align-items:center;gap:12px;cursor:pointer}
    .card-emoji{font-size:28px;flex-shrink:0}
    .card-info{flex:1}
    .card-title{font-size:15px;font-weight:700;color:#e2e8f0;margin-bottom:6px}
    .card-badges{display:flex;gap:6px;flex-wrap:wrap}
    .card-arrow{color:#4a7fa5;font-size:18px;flex-shrink:0;transition:transform .2s}
    .card.open .card-arrow{transform:rotate(180deg)}
    .card-detail{font-size:14px;color:#7ca8cc;line-height:1.65;margin-top:12px;padding-top:12px;border-top:1px solid #1e3a5f;display:none}
    .card.open .card-detail{display:block}

    /* Badge */
    .badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;white-space:nowrap}

    /* Bug header */
    .bug-head{display:flex;justify-content:space-between;align-items:flex-start}

    /* Recommendation */
    .rec-card{background:#0f2236;border:1px solid #1e3a5f;border-radius:16px;padding:20px 22px;margin-top:28px}
    .rec-title{font-weight:700;color:#e2e8f0;font-size:16px;margin-bottom:14px}
    .rec-item{display:flex;gap:14px;align-items:flex-start;padding:10px 0;border-bottom:1px solid #1e3a5f}
    .rec-item:last-child{border-bottom:none}
    .rec-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
    .rec-label{font-weight:700;font-size:14px}
    .rec-desc{font-size:13px;color:#7ca8cc;margin-top:2px}

    /* Tab content sections */
    .tab-content{display:none}
    .tab-content.active{display:block}

    @media(max-width:600px){
      main{padding:16px 16px 60px}
      header{padding:16px 16px 14px}
      header h1{font-size:22px}
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-label">🛒 Forkcast</div>
    <h1>Was könnte noch besser sein?</h1>
    <p>Vollständige Analyse aller Komponenten — von der Datenpipeline bis zum Frontend.</p>
    <div class="badge-row" id="status-badges"></div>
  </div>
</header>

<div class="tabs">
  <div class="tabs-inner" id="tab-bar"></div>
</div>

<main>
  <div id="tab-bugs" class="tab-content active"></div>
  <div id="tab-sofort" class="tab-content"></div>
  <div id="tab-mittel" class="tab-content"></div>
  <div id="tab-groß" class="tab-content"></div>
  <div id="tab-ki" class="tab-content"></div>

  <div class="rec-card">
    <div class="rec-title">💡 Empfehlung für die nächsten Schritte</div>
    <div id="rec-list"></div>
  </div>
</main>

<script>
// ── Data ──────────────────────────────────────────────────────
const C = {
  green:"#22c55e", yellow:"#f59e0b", red:"#ef4444",
  purple:"#a855f7", orange:"#f97316", cyan:"#06b6d4", muted:"#4a7fa5"
};

const BUGS = [
  { title:"recipe_interactions nie beschrieben", detail:"Tabelle existiert, Backend-Endpoint existiert — aber Frontend ruft ihn nie auf. Kein 'Habe ich gekocht' Button vorhanden. ✅ Inzwischen behoben.", severity:"mittel" },
  { title:"preishistorie nie angezeigt", detail:"Tabelle wird jede Woche befüllt, aber nirgendwo genutzt. Preisverlauf pro Produkt wäre wertvolle Info. ✅ Sparkline-Chart eingebaut.", severity:"niedrig" },
  { title:"Combi/Netto/REWE ohne Preisdaten", detail:"Diese Märkte erscheinen in /haendler, haben aber keine preis/normalpreis Felder → Deals werden beim Rezept-Matching gefiltert.", severity:"hoch" },
  { title:"estimatedCost/savedAmount ungenau", detail:"Claude schätzt Kosten — die echten Preise liegen in der DB. Schätzungen können um 20-40% abweichen.", severity:"mittel" },
  { title:"/api/v1/recipes/stores nie genutzt", detail:"Eigener Endpoint für Märkte mit Deal-Anzahl existiert, Frontend nutzt aber /haendler stattdessen.", severity:"niedrig" },
  { title:"top_disliked_ingredients View ungenutzt", detail:"SQL View wurde angelegt, wird aber nie abgefragt. Könnte für Analytics oder Prompt-Verbesserung genutzt werden.", severity:"niedrig" },
  { title:"gueltig_bis nicht in DealKoch angezeigt", detail:"Ablaufdatum ist in der DB — wäre wichtig für den User ('gilt noch 2 Tage'). Daten sind vorhanden.", severity:"mittel" },
];

const FEATURES = {
  sofort: [
    { emoji:"📤", title:"Web Share API — Liste ans Handy", detail:"Ein 'Teilen'-Button in der Einkaufsliste öffnet nativ WhatsApp/Notizen/etc. auf dem Handy. ~1 Stunde Arbeit.", impact:"hoch", effort:"minimal" },
    { emoji:"⭐", title:"'Habe ich gekocht' Button", detail:"Nach dem Kochen bewerten (1-5 Sterne). Schreibt in recipe_interactions. Grundlage für Lernalgorithmus. ✅ Inzwischen eingebaut.", impact:"hoch", effort:"klein" },
    { emoji:"📅", title:"Ablaufdatum auf Deal-Karten", detail:"'Gilt bis 21.06.' direkt auf der Karte. Daten sind schon in der DB (gueltig_bis) — eine Zeile Code.", impact:"mittel", effort:"minimal" },
    { emoji:"🔍", title:"Suche in Angebote-Seite", detail:"Backend hat /angebote/suche Endpoint bereits — UI fehlt. Suchleiste oben drüber bauen.", impact:"mittel", effort:"klein" },
    { emoji:"↕️", title:"Rezepte filtern & sortieren", detail:"Nach Kochzeit, Kalorien, Ersparnis, Schwierigkeit sortieren. Slider für Max-Kalorien.", impact:"mittel", effort:"klein" },
    { emoji:"🖨️", title:"Einkaufsliste drucken/exportieren", detail:"'Als Text kopieren' oder Print-CSS für Papiereinkauf — besonders nützlich wenn man kein Handy dabei hat.", impact:"mittel", effort:"minimal" },
  ],
  mittelfristig: [
    { emoji:"📅", title:"7-Tage Wochenplan", detail:"Jeden Tag ein Rezept wählen, kombinierte Einkaufsliste für die ganze Woche — die eigentliche Killer-Feature von Forkcast.", impact:"sehr hoch", effort:"mittel" },
    { emoji:"💰", title:"Echte Kostenberechnung", detail:"Nach Claude's Antwort: Zutaten gegen DB matchen → echte Preise eintragen statt Claude schätzen zu lassen. Genauer und günstiger.", impact:"hoch", effort:"mittel" },
    { emoji:"📊", title:"Preishistorie-Chart", detail:"Auf der Angebote-Seite: Sparkline pro Produkt. ✅ Grundstruktur eingebaut. Braucht mehrere Wochen Daten für aussagekräftige Charts.", impact:"hoch", effort:"mittel" },
    { emoji:"📱", title:"PWA — App auf dem Handy", detail:"manifest.json + Service Worker → DealKoch wird zur installierbaren App. Einkaufsliste offline nutzbar.", impact:"hoch", effort:"mittel" },
    { emoji:"🧠", title:"Lernender Prompt", detail:"recipe_interactions auswerten: wenn User Suppen oft überspringt, kommen weniger Suppen. ✅ Grundstruktur eingebaut.", impact:"hoch", effort:"mittel" },
    { emoji:"🔔", title:"Preisalarm", detail:"'Hähnchen kostet diese Woche −35% vs. Durchschnitt' — preishistorie Tabelle ist befüllt, Vergleichslogik fehlt noch.", impact:"mittel", effort:"mittel" },
    { emoji:"📊", title:"Koch-Dashboard", detail:"Was wurde diese Woche/Monat gekocht? Kalorien-Tracking über Zeit. Basis: recipe_interactions Tabelle.", impact:"mittel", effort:"mittel" },
  ],
  groß: [
    { emoji:"🔐", title:"Echter Login", detail:"Aktuell kann jeder auf 'Janis' Profil zugreifen wenn er den Namen kennt. Supabase Auth wäre die saubere Lösung für echte Mehrbenutzerfähigkeit.", impact:"sehr hoch", effort:"groß" },
    { emoji:"🏪", title:"Combi/Netto/REWE Preise fixen", detail:"Marktguru liefert für diese Märkte keine Preisdaten. Eigene Scraper oder andere API-Quelle nötig — größter Datenlücke.", impact:"hoch", effort:"groß" },
    { emoji:"🔄", title:"Scraper auch Donnerstags", detail:"Viele Supermarkt-Angebote starten donnerstags. Montag-only bedeutet 3 Tage verpasste Deals pro Woche.", impact:"mittel", effort:"klein" },
    { emoji:"🌍", title:"Mehrere Postleitzahlen", detail:"Aktuell hardcoded auf 33818 (Leopoldshöhe). PLZ als Parameter würde andere Regionen unterstützen und Forkcast skalierbar machen.", impact:"hoch", effort:"mittel" },
    { emoji:"🤝", title:"Familien-Modus", detail:"Mehrere Profile unter einem Account. 'Wir kaufen für 4 Personen, 2 mögen kein Fleisch' — geteilte Einkaufsliste.", impact:"mittel", effort:"groß" },
  ],
  ki: [
    { emoji:"🌿", title:"Saisonale Anpassung", detail:"Sommer → Salate/Grill, Winter → Suppen/Aufläufe. Aktuelles Datum in den Prompt einfließen lassen — minimaler Aufwand.", impact:"mittel", effort:"minimal" },
    { emoji:"⚖️", title:"Portionen-Scaler", detail:"Zutaten-Mengen im Rezept dynamisch anpassen (für 3 statt 2 Personen). Einfache Multiplikation im Frontend.", impact:"mittel", effort:"klein" },
    { emoji:"🔗", title:"Reste-Rezepte", detail:"'Ich habe noch Hähnchen vom Dienstag — was kann ich heute abend machen?' — neuer Prompt-Modus mit Zutaten-Input.", impact:"hoch", effort:"mittel" },
    { emoji:"📸", title:"Rezept-Bilder generieren", detail:"DALL-E oder Stable Diffusion für appetitliche Bilder. Kostet extra aber verbessert UX und Appetit stark.", impact:"mittel", effort:"mittel" },
    { emoji:"🧮", title:"Nährwert-Validierung", detail:"Claude schätzt Makros — oft ungenau. Gegen Open Food Facts API abgleichen für verlässliche Nährwert-Angaben.", impact:"mittel", effort:"groß" },
  ],
};

const TABS = [
  { id:"bugs",  label:"🐛 Bekannte Lücken",   count:BUGS.length,                  alert:{ bg:"#ef444412", bo:"#ef444430", color:"#ef4444", title:"⚠️ Vorhandene Tabellen & Endpoints die nie genutzt werden", sub:"Diese Sachen wurden gebaut, laufen aber ins Leere. Kein Crash, aber verschwendetes Potenzial." }},
  { id:"sofort",label:"⚡ Sofort umsetzbar",  count:FEATURES.sofort.length,       alert:{ bg:"#22c55e12", bo:"#22c55e30", color:"#22c55e", title:"⚡ Diese Features sind schnell umsetzbar", sub:"Kleiner Aufwand, direkt sichtbarer Mehrwert. Gute nächste Schritte." }},
  { id:"mittel", label:"📅 Mittelfristig",     count:FEATURES.mittelfristig.length,alert:{ bg:"#f59e0b12", bo:"#f59e0b30", color:"#f59e0b", title:"📅 Mittelfristig — 1-2 Tage Arbeit je Feature", sub:"Der Wochenplan allein würde DealKoch von 'cool' zu 'wirklich nützlich' machen." }},
  { id:"groß",   label:"🏗️ Größere Projekte",  count:FEATURES.groß.length,         alert:{ bg:"#f9731612", bo:"#f9731630", color:"#f97316", title:"🏗️ Größere Umbauarbeiten", sub:"Lohnt sich wenn das Projekt wächst oder andere Nutzer dazu kommen." }},
  { id:"ki",     label:"🧠 KI-Verbesserungen", count:FEATURES.ki.length,           alert:{ bg:"#a855f712", bo:"#a855f730", color:"#a855f7", title:"🧠 KI smarter machen", sub:"Rezepte die persönlicher werden je mehr du die App nutzt." }},
];

const IMPACT_C = { "sehr hoch":C.green, "hoch":C.cyan, "mittel":C.yellow, "niedrig":C.muted };
const EFFORT_C = { "minimal":C.green, "klein":C.cyan, "mittel":C.yellow, "groß":C.orange };
const SEV_C    = { "hoch":C.red, "mittel":C.yellow, "niedrig":C.muted };

const STATUS = [
  "✅ Marktguru + Aldi","✅ Supabase DB","✅ GitHub Actions",
  "✅ FastAPI / Railway","✅ Claude Haiku","✅ DealKoch App",
  "✅ Angebote-Seite","✅ Einkaufsliste","✅ Interaktionen","✅ Preishistorie",
];

// ── Render helpers ────────────────────────────────────────────
function badge(label, color) {
  return `<span class="badge" style="background:${color}20;color:${color};border:1px solid ${color}40">${label}</span>`;
}

function renderBugs() {
  return BUGS.map(b => `
    <div class="card bug-card ${b.severity==='hoch'?'high':''}">
      <div class="bug-head">
        <span class="bug-title">${b.title}</span>
        ${badge('Priorität: '+b.severity, SEV_C[b.severity])}
      </div>
      <p class="bug-body">${b.detail}</p>
    </div>`).join('');
}

function renderFeatures(list) {
  return list.map((f,i) => `
    <div class="card" id="fc-${currentTab}-${i}" onclick="toggleCard('fc-${currentTab}-${i}')">
      <div class="card-header">
        <span class="card-emoji">${f.emoji}</span>
        <div class="card-info">
          <div class="card-title">${f.title}</div>
          <div class="card-badges">
            ${badge('Impact: '+f.impact, IMPACT_C[f.impact])}
            ${badge('Aufwand: '+f.effort, EFFORT_C[f.effort])}
          </div>
        </div>
        <span class="card-arrow">▼</span>
      </div>
      <div class="card-detail">${f.detail}</div>
    </div>`).join('');
}

function renderAlert(a) {
  return `<div class="alert" style="background:${a.bg};border:1px solid ${a.bo}">
    <div class="alert-title" style="color:${a.color}">${a.title}</div>
    <div class="alert-sub">${a.sub}</div>
  </div>`;
}

function toggleCard(id) {
  document.getElementById(id).classList.toggle('open');
}

// ── Tab logic ─────────────────────────────────────────────────
let currentTab = 'bugs';

function switchTab(id) {
  currentTab = id;
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  document.querySelector(`.tab-btn[data-id="${id}"]`).classList.add('active');
  renderTab(id);
}

function renderTab(id) {
  const el = document.getElementById('tab-'+id);
  const t = TABS.find(t=>t.id===id);
  let html = renderAlert(t.alert);
  if(id === 'bugs') html += renderBugs();
  else html += renderFeatures(FEATURES[id] || []);
  el.innerHTML = html;
}

// ── Init ──────────────────────────────────────────────────────
// Status badges
document.getElementById('status-badges').innerHTML = STATUS.map(s =>
  `<span class="badge" style="background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3)">${s}</span>`
).join('');

// Tab bar
document.getElementById('tab-bar').innerHTML = TABS.map(t => `
  <button class="tab-btn ${t.id==='bugs'?'active':''}" data-id="${t.id}" onclick="switchTab('${t.id}')">
    ${t.label} <span class="tab-count">${t.count}</span>
  </button>`).join('');

// Recommendations
document.getElementById('rec-list').innerHTML = [
  { n:"1", t:"📤 Web Share", d:"Button für Einkaufsliste → Handy-Problem sofort gelöst", c:C.green },
  { n:"2", t:"⭐ Koch-Button", d:"'Habe ich gekocht' aktiviert die recipe_interactions Tabelle ✅ Eingebaut", c:C.green },
  { n:"3", t:"📅 Ablaufdatum", d:"gueltig_bis aus DB anzeigen — eine Zeile Code", c:C.green },
  { n:"4", t:"📅 Wochenplan", d:"Das eigentliche Ziel: 7 Tage planen, eine Einkaufsliste für alles", c:C.cyan },
  { n:"5", t:"💰 Echte Kosten", d:"Preise aus DB statt Claude-Schätzung — genauer und günstiger", c:C.cyan },
].map(r => `
  <div class="rec-item">
    <div class="rec-num" style="background:${r.c}">${r.n}</div>
    <div>
      <div class="rec-label" style="color:${r.c}">${r.t}</div>
      <div class="rec-desc">${r.d}</div>
    </div>
  </div>`).join('');

// Render initial tab
renderTab('bugs');
</script>
</body>
</html>
