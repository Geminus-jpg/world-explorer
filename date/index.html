<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Important Question 🐱</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #0a080f;
  color: #f0e8f8;
  font-family: 'Space Mono', monospace;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 30% 40%, rgba(168,85,247,.1) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 70% 60%, rgba(244,114,182,.09) 0%, transparent 70%);
  pointer-events: none;
}

/* ── FLOATING HEARTS ── */
.hearts { position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0; }
.heart  { position:absolute;bottom:-40px;opacity:0;animation:floatUp linear infinite; }
@keyframes floatUp {
  0%   { transform:translateY(0) rotate(0deg);  opacity:0; }
  10%  { opacity:.45; }
  90%  { opacity:.2; }
  100% { transform:translateY(-110vh) rotate(25deg); opacity:0; }
}

/* ── CARD ── */
.card {
  position:relative;z-index:10;
  background:rgba(18,12,28,0.92);
  border:1px solid rgba(168,85,247,0.3);
  border-radius:28px;
  padding:52px 60px 52px;
  width:min(480px, 92vw);
  text-align:center;
  box-shadow:0 32px 80px rgba(0,0,0,0.7), 0 0 60px rgba(168,85,247,0.06);
  backdrop-filter:blur(16px);
}

/* ── SCREENS ── */
#screen-ask { display:block; }
#screen-yes { display:none; }

/* ── CAT ── */
.cat-face {
  font-size: 120px;
  line-height: 1;
  margin-bottom: 6px;
  display: block;
  animation: catBob 3s ease-in-out infinite;
  filter: drop-shadow(0 0 24px rgba(244,114,182,0.3));
}
@keyframes catBob {
  0%,100%{ transform:translateY(0) rotate(-2deg); }
  50%    { transform:translateY(-10px) rotate(2deg); }
}
.cat-caption {
  font-size:11px;
  color:#6a5878;
  letter-spacing:.14em;
  margin-bottom:28px;
  display:block;
}

/* ── QUESTION ── */
.question {
  font-family:'Syne',sans-serif;
  font-size:28px;
  font-weight:800;
  color:#f0e8f8;
  line-height:1.25;
  margin-bottom:10px;
}
.question em { font-style:normal; color:#f472b6; }

.hint {
  font-size:12px;
  color:#6a5878;
  letter-spacing:.1em;
  margin-bottom:44px;
}

/* ── YES BUTTON (stays put) ── */
#btn-yes {
  font-family:'Syne',sans-serif;
  font-size:18px;
  font-weight:800;
  padding:16px 44px;
  border-radius:50px;
  border:none;
  cursor:pointer;
  background:linear-gradient(135deg,#f472b6,#a855f7);
  color:#fff;
  box-shadow:0 8px 32px rgba(244,114,182,.4);
  transition:transform .15s, box-shadow .15s;
  position:relative;
  z-index:11;
}
#btn-yes:hover { transform:scale(1.08); box-shadow:0 12px 40px rgba(244,114,182,.55); }
#btn-yes:active{ transform:scale(0.96); }

/* ── NO BUTTON (runs away — positioned by JS) ── */
#btn-no {
  font-family:'Syne',sans-serif;
  font-size:16px;
  font-weight:700;
  padding:14px 36px;
  border-radius:50px;
  border:1px solid rgba(255,255,255,0.15);
  background:linear-gradient(135deg,#f472b6,#a855f7);
  color:#fff;
  cursor:pointer;
  position:fixed;           /* key: fixed so it can go anywhere on screen */
  z-index:9999;
  transition:left .18s cubic-bezier(.22,1,.36,1), top .18s cubic-bezier(.22,1,.36,1);
  white-space:nowrap;
  pointer-events:all;
}

/* ── YES SCREEN ── */
.yes-emoji {
  font-size:72px;
  display:block;
  margin-bottom:16px;
  animation:popIn .6s cubic-bezier(.34,1.56,.64,1) forwards;
}
@keyframes popIn {
  from{ transform:scale(0) rotate(-20deg);opacity:0; }
  to  { transform:scale(1) rotate(0deg);  opacity:1; }
}
.yes-title {
  font-family:'Syne',sans-serif;
  font-size:32px;
  font-weight:800;
  color:#fbb6d6;
  margin-bottom:10px;
}
.yes-sub {
  font-size:13px;
  color:#9a8aaa;
  line-height:1.9;
  margin-bottom:32px;
}
.proposal {
  background:rgba(244,114,182,.07);
  border:1px solid rgba(244,114,182,.2);
  border-radius:16px;
  padding:24px 28px;
  text-align:left;
}
.p-header {
  font-size:10px;
  letter-spacing:.24em;
  text-transform:uppercase;
  color:#f472b6;
  margin-bottom:14px;
}
.p-row {
  display:flex;align-items:center;gap:14px;
  font-size:14px;color:#d0c8e0;
  padding:11px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.p-row:last-child{ border-bottom:none; }
.p-icon { font-size:17px;flex-shrink:0; }
.p-val  { color:#fbb6d6;font-weight:700; }
</style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<div class="card" id="card">

  <!-- ASK -->
  <div id="screen-ask">
    <span class="cat-face">🐱</span>
    <span class="cat-caption">*looks at you with big eyes*</span>

    <p class="question">Willst du mit mir auf ein<br><em>date</em> gehen? 🌙</p>
    <p class="hint">Überlege vorsichtig</p>

    <button id="btn-yes">Ja! 🥹</button>
  </div>

  <!-- YES -->
  <div id="screen-yes">
    <span class="yes-emoji">🎉</span>
    <div class="yes-title">Wusste ich es doch! 🥰</div>
    <p class="yes-sub">Gute Entscheidung<br>Wie sieht folgendes für dich aus?</p>
    <div class="proposal">
      <div class="p-header">Date</div>
      <div class="p-row"><span class="p-icon">📅</span> Wann: <span class="p-val">?</span></div>
      <div class="p-row"><span class="p-icon">📍</span> Wo: <span class="p-val">?</span></div>
      <div class="p-row"><span class="p-icon">🍽️</span> Plan: <span class="p-val">?</span></div>
      <div class="p-row"><span class="p-icon">⏰</span> Zeit: <span class="p-val">?</span></div>
    </div>
  </div>

</div>

<!-- No button lives OUTSIDE the card so it can roam freely -->
<button id="btn-no">Nein</button>

<script>
// ── Floating hearts ────────────────────────────────────────────────────────
const heartsEl = document.getElementById('hearts');
const EMOJIS = ['💕','💖','✨','🌸','💫','🩷','💝','🌙','⭐'];
function spawnHearts(n){
  for(let i=0;i<n;i++){
    const h = document.createElement('span');
    h.className = 'heart';
    h.textContent = EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
    h.style.left     = Math.random()*100+'vw';
    h.style.fontSize = (12+Math.random()*14)+'px';
    h.style.animationDuration = (7+Math.random()*9)+'s';
    h.style.animationDelay   = -(Math.random()*14)+'s';
    heartsEl.appendChild(h);
  }
}
spawnHearts(20);

// ── No button — place it next to Yes initially ────────────────────────────
const noBtn  = document.getElementById('btn-no');
const yesBtn = document.getElementById('btn-yes');
let escapes  = 0;

function placeNoNext(){
  const yr = yesBtn.getBoundingClientRect();
  noBtn.style.left = (yr.right + 24) + 'px';
  noBtn.style.top  = (yr.top + yr.height/2 - noBtn.offsetHeight/2) + 'px';
}

// Wait for layout then position
requestAnimationFrame(() => requestAnimationFrame(placeNoNext));

function runAway(e){
  // Prevent actual click
  if(e) e.preventDefault();

  escapes++;

  const pad  = 30;
  const btnW = noBtn.offsetWidth;
  const btnH = noBtn.offsetHeight;
  const maxX = window.innerWidth  - btnW - pad;
  const maxY = window.innerHeight - btnH - pad;

  // Current pos
  const cx = parseFloat(noBtn.style.left) || window.innerWidth/2;
  const cy = parseFloat(noBtn.style.top)  || window.innerHeight/2;

  // Try to land far from current spot
  let nx, ny, tries = 0;
  do {
    nx = pad + Math.random() * maxX;
    ny = pad + Math.random() * maxY;
    tries++;
  } while(tries < 30 && Math.hypot(nx-cx, ny-cy) < 180);

  noBtn.style.left = nx + 'px';
  noBtn.style.top  = ny + 'px';

  // Shrink text over time, min 11px
  const sz = Math.max(11, 16 - escapes * 0.5);
  noBtn.style.fontSize = sz + 'px';

  // Taunt messages
  const msgs = ['Ne','nope','nope!','immernoch nicht','...',':(','niemals!','lauf!','lol nein'];
  noBtn.textContent = msgs[Math.min(escapes, msgs.length-1)];
}

// Escape on mouseover AND touchstart (mobile)
noBtn.addEventListener('mouseover',  runAway);
noBtn.addEventListener('touchstart', runAway, {passive:false});

// ── Yes ────────────────────────────────────────────────────────────────────
yesBtn.addEventListener('click', ()=>{
  document.getElementById('screen-ask').style.display = 'none';
  document.getElementById('screen-yes').style.display = 'block';
  noBtn.style.display = 'none';
  spawnHearts(16);
});

// ── Reposition No if window resizes ───────────────────────────────────────
window.addEventListener('resize', () => {
  if(escapes === 0) placeNoNext();
});
</script>
</body>
</html>
